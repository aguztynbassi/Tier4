title: MsiExec Web Install Detected
id: g1h2i3j4-k5l6-7m8n-9o0p-q1r2s3t4u5v6 # Please generate a unique UUID for each rule
description: >
  Detects suspicious execution of `msiexec.exe` where the command line
  includes a web address (http:// or https://) as a parameter. This indicates
  an attempt to execute a remotely hosted MSI installer package. Adversaries
  frequently abuse this legitimate functionality for initial access, defense
  evasion, or payload delivery by leveraging a trusted, signed Microsoft binary.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/05/25 # Updated to current date
logsource:
  category: process_creation # Applicable for Sysmon EventID 1 or Windows Security Log 4688
  product: windows
  service: sysmon # Explicitly state Sysmon as the primary source for process events
detection:
  selection:
    EventID: 1 # Sysmon Event ID for Process Creation
    Image|endswith: '\msiexec.exe'
    CommandLine|contains:
      - 'http://'
      - 'https://'
  # Filter for known legitimate scenarios to reduce false positives.
  # This is crucial as enterprise software deployment tools often use web-based MSI installs.
  filter_legitimate_sources:
    # Whitelist specific parent processes that are known to legitimately trigger web MSI installs
    ParentImage|endswith:
      - '\System Center Configuration Manager\ccmexec.exe' # SCCM client
      - '\Microsoft Intune\IntuneManagementExtension.exe' # Intune management agent
      - '\Program Files\Microsoft Update\wuauclt.exe' # Windows Update client
      - '\Program Files (x86)\Google\Update\GoogleUpdate.exe' # Google Chrome/other Google software updates
      # Add other enterprise software deployment tools or update processes specific to your environment
    # Whitelist specific URLs or domains that are known to be legitimate sources for MSI packages
    CommandLine|contains:
      - 'update.microsoft.com'
      - 'download.microsoft.com'
      - 'client.cdn.google.com'
      - 'assets.adobe.com' # Example for Adobe updates
      # Add internal software deployment servers, e.g., 'your_company_app_repo.internal'
      # Consider also looking for the '/quiet' or '/qn' parameters often used in automated installs
      # but they are also common in malicious ones, so they might not be good for filtering.
  # The original rule had a 'User|in: EXCLUDED_USERS' filter.
  # While potentially useful for specific environments, defining EXCLUDED_USERS directly in a generic
  # Sigma rule is problematic. It's better to manage user-based exclusions at the SIEM level
  # or provide a placeholder for specific role accounts in the description.
  condition: selection and not filter_legitimate_sources
fields:
  - Image # The full path to msiexec.exe
  - CommandLine # The full command line used
  - ParentImage # The parent process that launched msiexec.exe
  - User # User account under which the process ran
  - ComputerName # Standard field name for the host
  - EventID # The Sysmon event ID (1)
  - RuleName # Sysmon specific field for rule matching
falsepositives:
  - Legitimate software installations and updates initiated by enterprise software deployment tools (e.g., SCCM, Intune).
  - Software updates for common applications (e.g., Google Chrome, Adobe products) that use web-hosted MSI packages.
  - Manual downloads and installations by administrators from trusted vendor websites.
  - Custom internal applications or scripts that fetch MSI packages from internal web servers.
level: medium # Set to medium initially due to the prevalence of legitimate web-based MSI installs in enterprise environments. Can be raised after thorough tuning and whitelisting.
tags:
  - attack.tactic: TA0005 # Defense Evasion
  - attack.tactic: TA0001 # Initial Access
  - attack.tactic: TA0002 # Execution
  - attack.technique: T1218 # Signed Binary Proxy Execution
  - attack.technique: T1218.007 # Signed Binary Proxy Execution (Msiexec)
references:
  - https://attack.mitre.org/techniques/T1218/007/ # MITRE ATT&CK T1218.007 (Msiexec)
  - https://lolbas-project.github.io/lolbas/Binaries/Msiexec/ # LoLBas entry for Msiexec.exe
  - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon # Sysmon official page
  - https://detection.fyi/elastic/detection-rules/windows/initial_access_execution_remote_via_msiexec/ # Example of similar detection