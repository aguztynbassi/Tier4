title: Creación de Cuenta en la Nube Detectada
id: "d4e5f6g7-h8i9-4j0k-1l2m-3n4o5p6q7r8s" # Nuevo ID generado
status: experimental
description: |
  Detección de nuevas creaciones de cuentas en la nube, lo que puede indicar el desarrollo de recursos por parte de un adversario.
author: aguztynbassi
date: 2024/07/18
modified: 2024/07/18
logsource:
  product: your_cloud_provider # Reemplazar con el producto de su proveedor de la nube (ej. aws, azure, gcp)
  service: account_management # Servicio que registra la actividad de la cuenta en la nube
  category: account_creation # Categoría para eventos de creación de cuentas
detection:
  selection:
    action: 'create_account' # La acción es la creación de una cuenta
  condition: selection
fields:
  - timestamp
  - user # El usuario o entidad que creó la cuenta
  - account_id # El ID de la cuenta creada
  - cloud_provider # El proveedor de la nube (ej. AWS, Azure, GCP)
  - action # La acción realizada (create_account)
tags:
  - attack.tactic: TA0042 # Desarrollo de Recursos
  - attack.technique: T1583.002 # Adquirir Infraestructura: Cuentas en la Nube
platforms:
  - cloud # Plataforma de la nube
level: medium # Nivel de severidad medio, ya que es una actividad de desarrollo, no una explotación directa.
