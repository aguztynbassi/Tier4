title: DCSync Attack Detected
id: q1r2s3t4-u5v6-7w8x-9y0z-1a2b3c4d5e6f # Please generate a unique UUID for each rule
description: >
  Detects attempts to perform a DCSync attack, which involves abusing the Active
  Directory Replication Service (ADRS) to extract credential hashes from a
  domain controller. This is typically indicated by a non-machine account
  requesting "Replicating Directory Changes" or "Replicating Directory Changes All"
  permissions, or by the creation of a suspicious Service Principal Name (SPN)
  related to global catalog replication.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/05/25 # Updated to current date
logsource:
  category: directory_service_access # Event ID 4662 is an object access event
  product: windows
  service: security # Windows Security event logs
detection:
  # Selection for Event ID 4662 (An operation was performed on an object)
  # This detects the "Replicating Directory Changes All" permission being requested/used.
  selection_4662:
    EventID: 4662
    # Access Mask for DS-Replication-Get-Changes-All (often '0x100' or similar)
    # This indicates a read-only access to directory changes.
    AccessMask: '0x100'
    # Properties (object type GUIDs) for "Replicating Directory Changes" permissions
    # These are the specific GUIDs for the replication rights.
    Properties|contains:
      - '1131f6aa-9c07-11d1-f79f-00c04fc2dcd2' # Replicating Directory Changes
      - '1131f6ad-9c07-11d1-f79f-00c04fc2dcd2' # Replicating Directory Changes All
      - '89e95b76-444d-4c62-991a-0facbeda640c' # DS-Replication-Get-Changes-All
    # Exclude machine accounts (which legitimately perform replication) by looking for non-ending '$'
    SubjectUserName|!endswith: '$' # SubjectUserName (the account performing the action) does NOT end with '$'
  # Filter for known legitimate service accounts that might perform replication-like activities
  filter_legit_accounts:
    SubjectUserName|startswith:
      - 'MSOL_' # Microsoft Online Services accounts (often for Azure AD Connect)
      - 'AAD_' # Azure AD Connect related accounts
      - 'AzureADConnect$' # Azure AD Connect Sync Service Account (Machine Account)
      # Add other specific, known legitimate service accounts in your environment
      # that are allowed to perform replication-like operations if they are not machine accounts.
  # Selection for Event ID 4742 (A computer account was changed)
  # This can detect SPN creation associated with a Global Catalog (GC) replication service.
  # While not a direct DCSync indicator, it can be a precursor or related activity.
  selection_4742_spn_creation:
    EventID: 4742 # A computer account was changed
    # ObjectChangeType: '%%1517' # Value for '%%1517' (Value Modified) for attribute changes
    # AttributeLDAPDisplayName: 'servicePrincipalName' # The attribute that was changed
    # AttributeValue: '*GC/*' # The value of the SPN being added/modified to indicate a global catalog service
    # The above fields might require parsing of the 4742 event details, which is not directly available
    # in the generic 4742 event structure without specific SIEM parsing.
    # The original rule used 'Service|contains: 'GC/' which is likely a reference to the SPN.
    # We will approximate this with CommandLine or specific fields if available in raw logs.
    ServicePrincipalNames: '*GC/*' # Check if the SPN change directly includes GC
  condition: (selection_4662 and not filter_legit_accounts) or selection_4742_spn_creation
fields:
  - SubjectUserName # The user account attempting DCSync (for 4662)
  - SubjectDomainName
  - ObjectServer # For 4662, the domain controller targeted
  - AccessMask # For 4662, the access mask
  - Properties # For 4662, the GUIDs of the requested rights
  - TargetUserName # The computer account being changed (for 4742)
  - TargetDomainName
  - ServicePrincipalNames # For 4742, if the SPN field is available (e.g. from Splunk/Elastic parser)
  - EventID # Event ID (4662 or 4742)
  - ComputerName # The domain controller where the event occurred
falsepositives:
  - Legitimate domain controllers or domain-joined machine accounts performing replication.
  - Legitimate service accounts (e.g., Azure AD Connect, some backup solutions)
    that are explicitly granted replication permissions for their function. These
    should be thoroughly whitelisted based on `SubjectUserName`.
  - Manual, legitimate configuration of SPNs on computer accounts (less common for GC SPNs).
level: critical # DCSync is a highly critical attack, enabling full credential compromise.
tags:
  - attack.tactic: TA0003 # Credential Access
  - attack.tactic: TA0005 # Defense Evasion
  - attack.tactic: TA0005 # Persistence (if permissions are granted permanently)
  - attack.technique: t1003 # Credential Dumping
  - attack.technique: t1003.003 # Credential Dumping: DCSync
references:
  - https://attack.mitre.org/techniques/T1003/003/ # MITRE ATT&CK T1003.003 (NTDS DIT, covers DCSync)
  - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-id-4662 # Microsoft Event ID 4662
  - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-id-4742 # Microsoft Event ID 4742
  - https://www.specterops.io/assets/resources/an_ace_up_the_sleeve_DCSync.pdf # In-depth DCSync explanation
  - https://adsecurity.org/?p=1729 # DCSync detection strategies