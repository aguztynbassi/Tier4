title: Active Directory Replication User Backdoor (DCSync Permissions)
id: o1p2q3r4-s5t6-7u8v-9w0x-y1z2a3b4c5d6 # Please generate a unique UUID for each rule
description: >
  Detects a potential Active Directory backdoor where the `nTSecurityDescriptor`
  attribute of a domain object is modified to grant Active Directory replication
  permissions (e.g., "Replicating Directory Changes" or "Replicating Directory
  Changes All") to a user or computer account. This modification enables the
  granted account to perform DCSync attacks, allowing an adversary to extract
  credential hashes for all domain users without needing to be a Domain Admin.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/05/25 # Updated to current date
logsource:
  category: directory_service_change # Specifically for Active Directory object modifications
  product: windows
  service: security # Windows Security event logs (Event ID 5136)
detection:
  selection:
    EventID: 5136 # A directory service object was modified.
    LdapDisplayName: 'nTSecurityDescriptor' # The attribute being modified is the security descriptor
    # These are the GUIDs for critical replication permissions that enable DCSync:
    # 1131f6aa-9c07-11d1-f79f-00c04fc2dcd2: Replicating Directory Changes
    # 1131f6ad-9c07-11d1-f79f00c04fc2dcd2: Replicating Directory Changes All
    # 89e95b76-444d-4c62-991a-0facbeda640c: DS-Replication-Get-Changes-All (often associated with 'Replicating Directory Changes All')
    AttributeValue|contains:
      - '1131f6aa-9c07-11d1-f79f-00c04fc2dcd2'
      - '1131f6ad-9c07-11d1-f79f00c04fc2dcd2'
      - '89e95b76-444d-4c62-991a-0facbeda640c'
  # Filter for known legitimate scenarios. While highly suspicious, some legitimate
  # services (like Microsoft Metadirectory Services ADMA) or specific replication
  # accounts might have these permissions granted by design.
  filter_legitimate_accounts:
    # It's better to exclude by SubjectUserName or specific ObjectDN if known.
    # The original 'User|startswith: EXCLUDED_USERS' is problematic for generic rules.
    SubjectUserName|startswith: # Replace 'DOMAIN\ServiceAccount$' with actual service accounts
      - 'DOMAIN\MMS_ADMA_Account$' # Example: Microsoft Metadirectory Services ADMA account
    # ObjectDN|endswith: # If changes to specific OUs/objects are expected for specific accounts
    #   - 'CN=YourServiceOU,DC=domain,DC=com'
  condition: selection and not filter_legitimate_accounts
fields:
  - SubjectUserName # The user account that initiated the modification
  - SubjectDomainName
  - TargetUserName # The user/object whose permissions were modified (not directly in 5136, but implied by ObjectDN)
  - ObjectDN # The distinguished name of the modified object (e.g., DC=domain,DC=com)
  - LdapDisplayName # Should be 'nTSecurityDescriptor'
  - AttributeValue # Contains the GUIDs of the replication rights
  - EventID
  - ComputerName # The domain controller where the event occurred
tags:
  - attack.tactic: TA0003 # Persistence
  - attack.tactic: TA0005 # Defense Evasion
  - attack.tactic: TA0006 # Credential Access
  - attack.technique: T1222 # File and Directory Permissions Modification
  - attack.technique: T1222.001 # Windows File and Directory Permissions Modification
  - attack.technique: T1003.003 # OS Credential Dumping: NTDS DIT (DCSync relies on this)
level: critical # This is a highly critical event indicating a severe compromise or backdoor.
falsepositives:
  - Legitimate changes by trusted administrators or service accounts that are known to require these permissions.
  - Changes made during routine Active Directory maintenance or migrations, especially in complex environments.
  - Some third-party applications that manage AD objects may require these permissions for legitimate operations.
references:
  - https://www.fireeye.com/blog/threat-research/2016/01/dcsync_attack.html
  - https://www.varonis.com/blog/dcsync-attack
  - https://docs.microsoft.com/en-us/windows-server/identity/ad-ds/manage/replication-permissions
  - https://www.ultimatewindowssecurity.com/securitylog/encyclopedia/event.aspx?eventid=5136
  - https://www.ultimatewindowssecurity.com/securitylog/encyclopedia/event.aspx?eventid=5137
  - https://www.ultimatewindowssecurity.com/securitylog/encyclopedia/event.aspx?eventid=5141