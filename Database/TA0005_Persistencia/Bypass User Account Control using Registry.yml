title: UAC Bypass Attempt using Registry
id: f7e6d5c4-b3a2-1e0d-9c8b-7a6f5d4c3e2f # Replace with a newly generated UUID
description: >
  Detection of User Account Control (UAC) bypass attempts by modifying specific
  registry keys associated with auto-elevated applications. Adversaries leverage
  these techniques to elevate process privileges on the system, often by
  manipulating `*\mscfile\shell\open\command\*` or `*\ms-settings\shell\open\command\*` paths.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/05/25 # Updated to current date
logsource:
  category: registry_event # Appropriate category for registry modifications
  product: windows
  service: sysmon # Specifies Sysmon as the logging service
detection:
  selection:
    EventID: # Sysmon Event IDs for registry modifications
      - 12 # Registry object added or deleted (key create)
      - 13 # Registry value set (value modify)
      - 14 # Registry object renamed (key rename)
    TargetObject|contains: # Standard field name for the registry key/value path
      - '\mscfile\shell\open\command\' # Common UAC bypass registry path
      - '\ms-settings\shell\open\command\' # Another common UAC bypass registry path
  # Filter for legitimate users or service accounts that might modify these keys.
  # This filter is a placeholder. You need to define specific users or groups
  # that are allowed to legitimately modify these registry paths in your environment.
  filter_legitimate_users:
    User|endswith: # Example placeholder for users to exclude (e.g., system accounts or known service accounts)
      - '\SYSTEM'
      - '\LOCAL SERVICE'
      - '\NETWORK SERVICE'
      # - 'MYDOMAIN\LegitInstallerAccount' # Add specific legitimate users/groups here
  condition: selection and not filter_legitimate_users
fields:
  - TargetObject # The registry key or value that was modified
  - EventID # The Sysmon event ID (12, 13, or 14)
  - User # User account that performed the registry modification
  - ComputerName # Standard field name for the host
  - Image # The process that performed the modification
  - Details # Depending on the SIEM, this might contain the new value
  - RuleName # Sysmon specific field for rule matching
falsepositives:
  - Very low false positive rate expected if the specific registry paths are accurately identified.
  - Custom applications or system configurations that legitimately modify these exact registry keys (highly unlikely in most environments, but possible).
level: high
tags:
  - attack.tactic: TA0005 # Defense Evasion
  - attack.tactic: TA0004 # Privilege Escalation
  - attack.technique: T1548.002 # Bypass User Account Control
  - attack.technique: T1548 # Abuse Elevation Control Mechanism

references:
  - https://attack.mitre.org/techniques/T1548/002/ # MITRE ATT&CK T1548.002 (Bypass User Account Control)
  - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon # Sysmon official page