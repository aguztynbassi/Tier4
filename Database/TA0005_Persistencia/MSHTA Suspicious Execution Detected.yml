title: MSHTA Suspicious Execution with Polyglot/Script Indicators
id: n1o2p3q4-r5s6-7t8u-9v0w-x1y2z3a4b5c6 # Please generate a unique UUID for each rule
description: >
  Detects suspicious execution patterns of `mshta.exe` where its command line
  contains keywords like 'vbscript' or refers to seemingly benign file extensions
  such as images (.jpg, .png), office documents (.xls, .doc), or archives (.zip, .lnk).
  This behavior is highly indicative of malicious activity, often involving
  polyglot files or obfuscated scripts, as `mshta.exe` is a common Living Off The
  Land Binary (LOLBIN) abused by adversaries for initial access, defense evasion,
  and indirect execution of malicious code.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/05/25 # Updated to current date
logsource:
  category: process_creation # Applicable for Sysmon EventID 1 or Windows Security Log 4688
  product: windows
  service: sysmon # Explicitly state Sysmon as the primary source for process events
detection:
  selection:
    EventID: 1 # Sysmon Event ID for Process Creation
    Image|endswith: '\mshta.exe'
    CommandLine|contains:
      - 'vbscript' # Indicates VBScript execution
      - '.jpg' # Suspicious if MSHTA is loading a JPG
      - '.jpeg' # Added for completeness
      - '.png' # Suspicious if MSHTA is loading a PNG
      - '.gif' # Added for completeness
      - '.bmp' # Added for completeness
      - '.lnk' # Suspicious if MSHTA is loading an LNK file
      - '.xls' # Suspicious if MSHTA is loading an Excel file
      - '.xlsx' # Added for completeness
      - '.doc' # Suspicious if MSHTA is loading a Word file
      - '.docx' # Added for completeness
      - '.ppt' # Added for completeness
      - '.pptx' # Added for completeness
      - '.zip' # Suspicious if MSHTA is loading a ZIP file
      - '.rar' # Added for completeness
      - '.7z' # Added for completeness
      - '.pdf' # Suspicious if MSHTA is loading a PDF file
      - '.html' # Legitimate, but in combination with other indicators, can be malicious
      - '.hta' # Legitimate, but in combination with other indicators, can be malicious
      - 'file://' # Often used with malicious HTA/HTML files
      - 'data:text/html' # Data URI scheme for embedded HTML/script
  # Filter for known legitimate scenarios. Legitimate MSHTA execution typically involves
  # .hta files from expected locations or standard HTML/JS scripts.
  filter_legitimate_usage:
    CommandLine|contains:
      - 'C:\Program Files\Microsoft Office\' # Some legitimate Office components might use MSHTA
      - 'C:\Windows\System32\' # For built-in HTAs, but less common with these suspicious extensions
      - 'C:\Program Files (x86)\'
      # Whitelist specific, known legitimate HTA paths or scripts if they are used in your environment
      # e.g., for legacy applications or specific administrative tools.
      # CommandLine|contains|all:
      #   - 'C:\Program Files\YourCompanyApp\legit.hta'
      #   - 'C:\Program Files\VendorApp\update_script.hta'
    # The original rule had 'User|in: EXCLUDED_USERS'. This is problematic for generic rules
    # and better managed at the SIEM level for specific environments.
  condition: selection and not filter_legitimate_usage
fields:
  - Image # The full path to mshta.exe
  - CommandLine # The full command line of mshta.exe
  - ParentImage # The parent process that launched mshta.exe
  - User # User account under which the process ran
  - ComputerName # Standard field name for the host
  - EventID # The Sysmon event ID (1)
  - RuleName # Sysmon specific field for rule matching
falsepositives:
  - Rare legitimate legacy applications or administrative scripts that use MSHTA
    in unusual ways, potentially involving embedded scripts or polyglot files.
  - Development or testing activities involving HTML applications or scripts.
  - Benign HTML files opened with mshta.exe that coincidentally contain some of the keywords (less likely with polyglot extensions).
level: high # Setting to high due to the strong correlation with malicious activity.
tags:
  - attack.tactic: TA0005 # Defense Evasion
  - attack.tactic: TA0002 # Execution
  - attack.technique: T1218 # Signed Binary Proxy Execution
  - attack.technique: T1218.005 # Signed Binary Proxy Execution (Mshta)
  - attack.technique: T1140 # Deobfuscate/Decode Files or Information
references:
  - https://attack.mitre.org/techniques/T1140/ # MITRE ATT&CK T1140 (Deobfuscate/Decode Files or Information)
  - https://attack.mitre.org/techniques/T1218/005/ # MITRE ATT&CK T1218.005 (Mshta)
  - https://lolbas-project.github.io/lolbas/Binaries/Mshta/ # LoLBas entry for Mshta.exe
  - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon # Sysmon official page
  - https://www.picussecurity.com/resource/living-off-the-land-mshta-exe # Context on MSHTA abuse