title: Windows Error Process Masquerading
id: d1c0b9a8-7e6f-5d4c-3b2a-10f9e8d7c6b5 # Replace with a newly generated UUID
description: >
  Detection of suspicious network connections made by Windows error reporting processes (WerMgr.exe or WerFault.exe)
  shortly after their execution. This behavior can indicate masquerading or abuse of these legitimate binaries
  by adversaries for defense evasion, potentially to exfiltrate data or establish C2 communication.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/05/25 # Updated to current date
logsource:
  category: process_creation # For EventID 1
  product: windows
  service: sysmon # Specifies Sysmon as the logging service
detection:
  selection_process_creation:
    EventID: 1 # Sysmon Event ID for Process Creation
    Image|endswith:
      - '\WerMgr.exe'
      - '\WerFault.exe'
  selection_network_connection:
    EventID: 3 # Sysmon Event ID for Network Connection
    Image|endswith:
      - '\WerMgr.exe'
      - '\WerFault.exe'
    Initiated: 'true' # Ensure the connection was initiated by the process itself
    # Exclude common Microsoft update/telemetry destinations if they generate too many FPs
    # DestinationIp|excludes:
    #   - '23.x.x.x/8' # Example: Microsoft IP ranges
    #   - '40.x.x.x/8'
    # DestinationPort|excludes:
    #   - 80
    #   - 443
  timeframe: 1m # Network connection occurs within 1 minute of process creation
  condition: selection_process_creation |followed-by| selection_network_connection
fields:
  - ComputerName # Standard field name for the host
  - User # Standard field name for the user
  - Image # The process image (WerMgr.exe or WerFault.exe)
  - CommandLine # The command line of the process
  - DestinationIp
  - DestinationPort
  - RuleName # Sysmon specific field for rule matching
falsepositives:
  - Legitimate crash reporting or telemetry if it involves network communication shortly after the process starts.
  - Very rare cases where legitimate software uses these processes in an unusual way that involves networking (should be investigated).
level: medium # Changed to medium as legitimate activity can sometimes generate network connections. Raise to high if FPs are low in your environment.
tags:
  - attack.tactic: TA0005 # Defense Evasion
  - attack.technique: T1036 # Masquerading
references:
  - https://attack.mitre.org/techniques/T1036/ # MITRE ATT&CK T1036 (Masquerading)
  - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon # Sysmon official page