title: DLL Side-Loading via Microsoft Defender Binaries
id: k1l2m3n4-o5p6-7q8r-9s0t-u1v2w3x4y5z6 # Please generate a unique UUID for each rule
description: >
  Detects DLL side-loading attempts by monitoring the loading of `mpclient.dll`
  by Microsoft Defender executables (`MpCmdRun.exe` or `NisSrv.exe`) when these
  executables are run from non-default, suspicious paths. Adversaries abuse
  this technique to bypass security controls, achieve defense evasion, and
  potentially gain persistence by coercing a legitimate, signed Microsoft
  binary into loading a malicious DLL.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/05/25 # Updated to current date
logsource:
  category: image_load # Sysmon Event ID 7 for DLL load events
  product: windows
  service: sysmon # Explicitly state Sysmon as the source for image load events
detection:
  # This selection looks for mpclient.dll being loaded by specific Defender processes
  selection:
    EventID: 7 # Sysmon Event ID for ImageLoad (DLL/EXE being loaded)
    Image|endswith: '\mpclient.dll' # The loaded DLL (often targeted in these attacks)
    ProcessImage|endswith: # The process loading the DLL
      - '\MpCmdRun.exe'
      - '\NisSrv.exe'
  # Filter out legitimate loads where the Defender binary is executed from its standard, trusted paths.
  # Any load where ProcessImage does NOT start with these paths is suspicious.
  filter_legitimate_paths:
    ProcessImage|startswith:
      - 'C:\Program Files\Windows Defender\'
      - 'C:\ProgramData\Microsoft\Windows Defender\Platform\'
      # Add other legitimate Microsoft Defender installation paths if observed in your environment
  condition: selection and not filter_legitimate_paths
fields:
  - EventID # Sysmon event ID (7)
  - Image # The full path to the loaded DLL (mpclient.dll)
  - ProcessImage # The full path to the process that loaded the DLL (MpCmdRun.exe or NisSrv.exe)
  - OriginalFileName # Original file name of the loaded DLL
  - Company # Company name of the loaded DLL
  - CommandLine # Full command line of the ProcessImage
  - ParentImage # Parent process of the ProcessImage
  - User # User account under which the process ran
  - ComputerName # Standard field name for the host
  - RuleName # Sysmon specific field for rule matching
falsepositives:
  - Very low false positive rate expected. Legitimate Microsoft Defender binaries
    should consistently load their DLLs from expected system paths.
  - Extremely rare cases of legitimate third-party software or unusual system
    configurations that might interact with Defender binaries in non-standard ways.
    These should be thoroughly investigated and whitelisted if deemed truly benign.
level: high # Setting to high due to the strong correlation with DLL side-loading and defense evasion.
tags:
  - attack.tactic: TA0005 # Defense Evasion
  - attack.tactic: TA0007 # Persistence
  - attack.technique: T1574 # Hijack Execution Flow
  - attack.technique: T1574.002 # Hijack Execution Flow (DLL Side-Loading)
references:
  - https://attack.mitre.org/techniques/T1574/002/ # MITRE ATT&CK T1574.002 (DLL Side-Loading)
  - https://lolbas-project.github.io/lolbas/Binaries/Mpcmdrun/ # LoLBas entry for MpCmdRun.exe
  - https://lolbas-project.github.io/lolbas/Binaries/Nissrv/ # LoLBas entry for NisSrv.exe
  - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon # Sysmon official page