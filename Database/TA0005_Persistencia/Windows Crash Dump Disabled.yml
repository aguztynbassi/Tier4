title: Windows Crash Dump Deshabilitado
id: "e1f2a3b4-c5d6-4e7f-8a9b-0c1d2e3f4a5b" # Nuevo ID generado
status: critical
description: |
  Se detecta que la configuración del registro de volcado de memoria de Windows está deshabilitada. Esto puede ser un intento de un adversario para evadir la detección y la capacidad de análisis forense.
author: aguztynbassi
date: 2024/07/18
modified: 2024/07/18
logsource:
  product: windows
  service: sysmon
  category: registry # Event ID 13 es un evento de Sysmon para modificación de valores de registro.
detection:
  selection:
    EventID: 13 # Sysmon Event ID for Registry Value Set
    TargetObject: 'HKLM\System\CurrentControlSet\Control\CrashControl\CrashDumpEnabled'
    Details: 'DWORD (0x00000000)' # El valor 0x00000000 indica que el volcado de memoria está deshabilitado.
  condition: selection
fields:
  - Timestamp
  - EventID
  - User
  - Computer
  - ProcessName # Proceso que realiza la modificación
  - TargetObject # La clave de registro modificada
  - Details # Detalles de la modificación (nuevo valor)
tags:
  - attack.tactic: TA0005 # Evasión de Defensa
  - attack.technique: T1112 # Modificar Registro
falsepositives:
  - Configuraciones legítimas de seguridad que deshabilitan los volcados de memoria para proteger datos sensibles.
  - Políticas corporativas que restringen la creación de volcados de memoria por razones de cumplimiento o privacidad.
  - Herramientas de administración del sistema que modifican esta configuración como parte de su operación normal.
level: critical # Nivel de severidad de la detección
references:
  - https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/bug-check-code-reference2 # Documentación de Microsoft sobre códigos de comprobación de errores
  - https://attack.mitre.org/techniques/T1112/ # T1112: Modificar Registro
  - https://www.cisa.gov/uscert/ncas/alerts/aa20-245a # CISA Alert sobre amenazas a Windows
  - https://www.fireeye.com/blog/threat-research/2020/04/malicious-windows-crash-dumps.html # FireEye sobre volcado de memoria malicioso