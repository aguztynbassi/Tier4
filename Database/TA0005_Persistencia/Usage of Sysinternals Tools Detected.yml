title: Usage of Sysinternals Tools Detected
id: a9b8c7d6-e5f4-3d2c-1b0a-9876543210fe # Replace with a newly generated UUID
description: >
  Detection of the use of Sysinternals tools, indicated by either the creation
  of the `EulaAccepted` registry key or the presence of the `-accepteula` flag
  in a process command line. Adversaries often use Sysinternals tools for various
  purposes, including information gathering, privilege escalation, and defense evasion,
  as they are often trusted executables.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/05/25 # Updated to current date
logsource:
  category: all # Can be process_creation or registry_event, using all for broader coverage
  product: windows
  service: sysmon # Specifies Sysmon as the logging service
detection:
  # Condition 1: Detection based on registry modification (EULA acceptance)
  registry_eula_acceptance:
    EventID: 13 # Sysmon Event ID for RegistryValue SET
    TargetObject|endswith: '\EulaAccepted' # Standard field name for the registry key/value path
    Details|contains: '0x00000001' # Value set to 1 (indicating acceptance)
    # Exclude known legitimate sources if they manage this key in a specific way
    # Image|endswith: '\legit_sysadmin_script.exe'
  # Condition 2: Detection based on command line flag
  accepteula_command_line_flag:
    EventID: 1 # Sysmon Event ID for Process Creation
    CommandLine|contains: '-accepteula'
    # Exclude common system processes if they somehow use this flag legitimately
    # Image|startswith|not:
    #   - 'C:\Windows\System32\'
    #   - 'C:\Windows\SysWOW64\'
  # Filter to exclude common legitimate Sysinternals usage, if applicable.
  # This filter is highly dependent on your environment and how Sysinternals tools are managed.
  # For example, if you have automated scripts or IT administrators running specific Sysinternals tools regularly.
  # filter_legitimate_usage:
  #   User|endswith: # Example: IT Admin accounts
  #     - '\YourDomain\IT_Admin_Group'
  #   Image|endswith: # Example: Specific tools that are routinely used and accepted
  #     - '\procexp.exe'
  #     - '\procmon.exe'
  condition: registry_eula_acceptance or accepteula_command_line_flag
fields:
  - Image # The process image (for EventID 1)
  - CommandLine # The full command line (for EventID 1)
  - TargetObject # The registry key/value that was modified (for EventID 13)
  - Details # The value set for the registry key (for EventID 13)
  - User # User account under which the event occurred
  - ComputerName # Standard field name for the host
  - RuleName # Sysmon specific field for rule matching
falsepositives:
  - Legitimate use by IT administrators, developers, or security analysts for troubleshooting or forensics.
  - Automated scripts or tools that manage Sysinternals deployments and pre-accept EULAs.
  - Development environments where Sysinternals tools are frequently used.
level: medium # Setting to medium as legitimate use is common. Requires careful tuning and context.
tags:
  - attack.tactic: TA0005 # Defense Evasion
  - attack.technique: t1036 # Masquerading
references:
  - https://docs.microsoft.com/en-us/sysinternals/ # Sysinternals official page
  - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon # Sysmon official page