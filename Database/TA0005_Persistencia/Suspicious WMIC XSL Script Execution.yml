title: Suspicious WMIC XSL Script Execution
id: f0e1d2c3-a4b5-6c7d-8e9f-0123456789ab # Replace with a newly generated UUID
description: >
  Detection of WMIC.exe executing with an XSL stylesheet, which in turn loads
  JScript.dll or VBScript.dll. This technique is often used by adversaries
  for application whitelisting bypass and defense evasion by leveraging XSL Script Processing.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/05/25 # Updated to current date
logsource:
  category: process_creation # For EventID 1 (WMIC execution)
  product: windows
  service: sysmon # Specifies Sysmon as the logging service
detection:
  wmic_execution:
    EventID: 1 # Sysmon Event ID for Process Creation
    Image|endswith: '\wmic.exe'
    CommandLine|contains: 'format:' # WMIC XSL bypass involves using the /format argument
  xsl_dll_load:
    EventID: 7 # Sysmon Event ID for Image Load
    Image|endswith: # The process that loads the DLL, typically WMIC.exe itself or a child
      - '\wmic.exe'
      - '\mshta.exe' # Sometimes mshta is involved in XSL processing
      - '\cmd.exe'
      - '\powershell.exe'
    LoadedImage|endswith: # The DLLs loaded by the above process
      - '\jscript.dll'
      - '\vbscript.dll'
  condition: wmic_execution and xsl_dll_load
fields:
  - Image # The process image (wmic.exe or the one loading the DLL)
  - CommandLine # The full command line of the process
  - LoadedImage # The loaded DLL (jscript.dll or vbscript.dll)
  - ComputerName # Standard field name for the host
  - User # Standard field name for the user
  - RuleName # Sysmon specific field for rule matching
falsepositives:
  - Legitimate administrative tasks or scripts that use WMIC with XSL for reporting.
  - Very rare cases where legitimate software might use WMIC with XSL.
level: high
tags:
  - attack.tactic: TA0005 # Defense Evasion
  - attack.technique: T1220 # XSL Script Processing
references:
  - https://attack.mitre.org/techniques/T1220/ # MITRE ATT&CK T1220 (XSL Script Processing)
  - https://docs.microsoft.com/en-us/windows/win32/wmi/wmic # WMIC documentation
  - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon # Sysmon official page