title: Exclusión de Windows Defender Establecida Detectada
id: "7e5d2c1a-9f8b-4c3d-2a1b-0e9f8c7d6b5a" # Nuevo ID generado
status: high
description: |
  Detecta la adición de una exclusión en el registro de Windows Defender, lo que permite a una entidad eludir el escaneo antivirus de Windows Defender.
author: aguztynbassi
date: 2024/07/18
modified: 2024/07/18
logsource:
  product: windows
  service: windows_defender # Servicio de Windows Defender
  category: configuration # Cambios de configuración
detection:
  selection:
    EventID: 5007 # ID de evento para "La configuración de Microsoft Defender Antivirus ha cambiado."
    # Asume que 'NewValue' es un campo que contiene la ruta de la exclusión o parte de ella.
    # Si el campo real en tus logs es diferente (ej. 'Message' o 'SettingName'), ajústalo.
    NewValue|contains: 'HKLM\\SOFTWARE\\Microsoft\\Windows Defender\\Exclusions\\'
  condition: selection
fields:
  - EventID
  - Timestamp
  - User # Usuario que realizó el cambio
  - Computer # Nombre del equipo
  - SettingName # Nombre de la configuración cambiada (si está disponible)
  - OldValue # Valor anterior de la configuración (si está disponible)
  - NewValue # Nuevo valor de la configuración (si está disponible)
tags:
  - attack.tactic: TA0005 # Evasión de Defensas
  - attack.technique: T1562 # Deteriorar Defensas
  - attack.subtechnique: T1562.001 # Deteriorar Defensas: Deshabilitar o Modificar Herramientas
level: high # Nivel de severidad de la detección
