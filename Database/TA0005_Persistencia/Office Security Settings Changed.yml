title: Configuración de Seguridad de Office Modificada
id: "e0f1a2b3-c4d5-4e6f-7a8b-9c0d1e2f3a4b" # Nuevo ID generado
status: high
description: |
  Se detecta la modificación de la configuración de seguridad de Microsoft Office en el registro. Esto puede indicar un intento de un adversario de reducir las defensas o habilitar la ejecución de macros maliciosas.
author: aguztynbassi
date: 2024/07/18
modified: 2024/07/18
logsource:
  product: windows
  service: sysmon
  category: registry # Event ID 13 es un evento de Sysmon para modificación de valores de registro.
detection:
  selection:
    EventID: 13 # Sysmon Event ID for Registry Value Set
    TargetObject|contains: # Patrones de objetos de registro objetivo
      - '*\\Security\\Trusted Documents\\TrustRecords*'
      - '*\\Security\\AccessVBOM*'
      - '*\\Security\\VBAWarnings*'
  condition: selection
fields:
  - Timestamp
  - EventID
  - User
  - Computer
  - ProcessName # Proceso que realiza la modificación
  - TargetObject # La clave de registro modificada
  - Details # Detalles de la modificación (nuevo valor)
tags:
  - attack.tactic: TA0005 # Evasión de Defensa
  - attack.technique: T1112 # Modificar Registro
platforms:
  - windows
level: high # Nivel de severidad de la detección
references:
  - https://docs.microsoft.com/en-us/office/troubleshoot/security/trusted-documents # Documentación oficial de Microsoft sobre documentos de confianza
  - https://attack.mitre.org/techniques/T1112/ # T1112: Modificar Registro
  - https://www.cisa.gov/uscert/ncas/alerts/aa20-245a # CISA Alert sobre amenazas a Microsoft Office
  - https://www.microsoft.com/en-us/microsoft-365/blog/2020/08/04/protecting-against-malicious-macros-in-office-documents/ # Blog de Microsoft sobre protección contra macros maliciosas