title: Windows CryptoAPI Spoofing Vulnerability (CVE-2020-0601) Detection
id: e1d2c3b4-a5f6-7890-1234-567890abcdef # Please generate a unique UUID for each rule
description: >
  Detects attempts to exploit the Windows CryptoAPI Spoofing Vulnerability (CVE-2020-0601),
  also known as "CurveBall." This vulnerability allows attackers to spoof code-signing
  certificates. This rule specifically identifies Event ID 1 generated in the
  'Application' log by patched systems when a manipulated certificate is detected.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/05/25
logsource:
  category: application_event # This event is found in the Application event log
  product: windows
  provider: Microsoft-Windows-Audit-CVE # The specific provider for this detection event
detection:
  selection:
    EventID: 1 # The specific Event ID generated for CVE-2020-0601 detection on patched systems
    Message|contains: 'CVE-2020-0601' # The event message will contain the CVE ID
  # This filter is a placeholder. For this specific CVE detection event,
  # false positives are expected to be very low unless you're conducting internal testing.
  filter_known_false_positives:
    User|endswith: # Example: exclude specific service accounts or test accounts if necessary
      # - '\SYSTEM'
      # - 'YourDomain\TestAccount'
      - 'EXCLUDED_USER_PLACEHOLDER' # **Remember to replace or remove this placeholder**
  condition: selection and not filter_known_false_positives
fields:
  - EventID
  - Message # The full event message containing vulnerability details
  - User # The user context under which the process attempting exploitation ran
  - ComputerName # The name of the affected host
  - Image # The process image, if available in this event's data
  - CommandLine # The command line, if available in this event's data
tags:
  - attack.tactic: TA0005 # Defense Evasion
  - attack.technique: T1553 # Subvert Trust Controls
  - attack.technique: T1553.002 # Subvert Trust Controls: Code Signing
references:
  - https://portal.msrc.microsoft.com/en-US/security-guidance/advisory/CVE-2020-0601
  - https://www.splunk.com/en_us/blog/security/cve-2020-0601-how-to-operationalize-the-handling-of-vulnerabilities-in-your-soc.html
  - https://attack.mitre.org/techniques/T1553/002/
risk: high
platforms:
  - Windows