title: Msbuild Spawned by Unusual Parent Process
id: f9e8d7c6-b5a4-3c2b-1a0d-9f8e7c6b5a4d # Replace with a newly generated UUID
description: >
  Detection of suspicious execution of msbuild.exe by an uncommon parent process.
  MSBuild.exe is a legitimate Microsoft tool used for building and deploying software,
  but adversaries often abuse it for defense evasion and proxy execution due to its
  ability to execute arbitrary code within XML project files.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/05/25 # Updated to current date
logsource:
  category: process_creation # Sysmon EventID 1 is for process creation
  product: windows
  service: sysmon # Specifies Sysmon as the logging service
detection:
  selection:
    EventID: 1 # Sysmon Event ID for Process Creation
    Image|endswith: '\MSBuild.exe' # Standard Sysmon field for process image
  parent_image_exclusion:
    ParentImage|endswith: # Standard Sysmon field for parent process image
      - '\devenv.exe' # Visual Studio IDE
      - '\cmd.exe' # Command Prompt
      - '\powershell.exe' # PowerShell
      - '\msbuild.exe' # MSBuild calling itself
      - '\explorer.exe' # Launched from desktop/file explorer
      - '\python.exe' # Python scripts often invoke build tools
      - '\nuget.exe' # Package manager related to .NET builds
      - '\VBCSCompiler.exe' # .NET compiler
      - '\ServiceHub.Host.CLR.x64.exe' # Visual Studio related process
      - '\VsixInstaller.exe' # Visual Studio extension installer
      - '\git.exe' # Git often invokes build tools
  condition: selection and not parent_image_exclusion
fields:
  - Image # The process image (MSBuild.exe)
  - ParentImage # The parent process that launched MSBuild.exe
  - CommandLine # The full command line of MSBuild.exe
  - User # User account under which the process ran
  - ComputerName # Standard field name for the host
  - RuleName # Sysmon specific field for rule matching
falsepositives:
  - Legitimate development activities where MSBuild is invoked by custom build scripts, other development tools not listed, or automation.
  - CI/CD pipelines or automated deployment tools.
level: medium # MSBuild is commonly used, so a medium level is appropriate for initial detection. Can be raised if FPs are low.
tags:
  - attack.tactic: TA0005 # Defense Evasion
  - attack.technique: t1127 # Trusted Developer Utilities Proxy Execution
  - attack.technique: t1127.001 # Trusted Developer Utilities Proxy Execution: MSBuild
references:
  - https://attack.mitre.org/techniques/T1127/001/ # MITRE ATT&CK T1127.001 (MSBuild)
  - https://docs.microsoft.com/en-us/visualstudio/msbuild/msbuild # Microsoft MSBuild documentation
  - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon # Sysmon official page