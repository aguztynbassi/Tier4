title: Remote File Execution via MSIEXEC
id: c1d2e3f4-g5h6-i7j8-k9l0-m1n2o3p4q5r6 # Replace with a newly generated UUID
description: >
  Detection of suspicious use of msiexec.exe to install remote Microsoft Software Installer (MSI) files.
  This may indicate an attempt to execute malicious payloads while bypassing traditional defenses
  by leveraging msiexec.exe as a signed binary proxy execution tool.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/05/25 # Updated to current date
logsource:
  category: process_creation # Sysmon EventID 1 is for process creation
  product: windows
  service: sysmon # Specifies Sysmon as the logging service
detection:
  selection:
    EventID: 1 # Sysmon Event ID for Process Creation
    Image|endswith: '\msiexec.exe'
    CommandLine|contains: # Looking for remote HTTP/HTTPS installations and silent flags
      - 'http://'
      - 'https://'
    CommandLine|contains|all: # Ensure an install flag and a silent flag are present
      - '/i' # Install package
      - # One of the silent flags
        - '/q'
        - '/quiet'
        - '/qn'
    ParentImage|contains|not: # Exclude common legitimate installers
      - 'setup' # Generic setup programs
      - 'installer'
      - 'update'
      - 'msiexec.exe' # Exclude self-launching MSIEXEC instances unless further analysis is done
    IntegrityLevel|excludes: 'System' # Exclude processes running at System integrity level (often legitimate system processes)
  condition: selection
fields:
  - Image # The process image (msiexec.exe)
  - CommandLine # The full command line
  - ParentImage # The parent process that launched msiexec.exe
  - IntegrityLevel # Integrity level of the process
  - User # User account under which the process ran
  - ComputerName # Standard field name for the host
  - RuleName # Sysmon specific field for rule matching
falsepositives:
  - Legitimate software deployments or updates from internal/trusted web servers that use HTTP/HTTPS for MSI downloads.
  - Software development or testing environments.
  - Some legitimate cloud-managed deployments might use remote MSI execution.
level: high
tags:
  - attack.tactic: TA0005 # Defense Evasion
  - attack.technique: T1218 # Signed Binary Proxy Execution
  - attack.technique: T1218.007 # Signed Binary Proxy Execution: Msiexec
references:
  - https://attack.mitre.org/techniques/T1218/007/ # MITRE ATT&CK T1218.007 (Msiexec)
  - https://docs.microsoft.com/en-us/windows/win32/msi/command-line-options # Microsoft Msiexec.exe command-line options
  - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon # Sysmon official page