title: Enumeración de Active Directory vía ADFind
id: "c7e8f9a0-b1c2-4d3e-5f6a-7b8c9d0e1f2a" # Nuevo ID generado
status: high
description: |
  Se detecta la enumeración de Active Directory utilizando la herramienta AdFind. AdFind es una utilidad basada en CLI que se puede utilizar para recopilar información de Active Directory como unidades organizativas, usuarios, computadoras y grupos. Los adversarios pueden usar esta utilidad para recopilar información relacionada con Active Directory.
author: aguztynbassi
date: 2024/07/18
modified: 2024/07/18
logsource:
  product: windows
  service: sysmon
  category: process_creation
detection:
  selection:
    EventID: 1 # Sysmon Event ID for Process Creation
    Image|endswith: '.exe' # Matches any executable
    CommandLine|contains:
      - '* -f *objectcategory=*'
      - '* -sc trustdmp*'
      - '*lockoutduration*'
      - '*lockoutthreshold*'
      - '*lockoutobservationwindow*'
      - '*maxpwdage*'
      - '*minpwdage*'
      - '*minpwdlength*'
      - '*pwdhistorylength*'
      - '*pwdproperties*'
      - '*-sc admincountdmp*'
      - '*-sc exchaddresses*'
  condition: selection
fields:
  - Timestamp
  - EventID
  - User
  - Computer
  - ProcessName # The name of the process (e.g., AdFind.exe)
  - CommandLine # The full command line executed
  - ParentProcessName # The parent process
tags:
  - attack.tactic: TA0002 # Ejecución
  - attack.tactic: TA0007 # Descubrimiento
  - attack.technique: T1059 # Intérprete de Comandos y Scripts
  - attack.tactic: T1059.001 # PowerShell (Though AdFind is CLI, it can be run via PowerShell)
  - attack.technique: T1087 # Account Discovery
  - attack.technique: T1069 # Permission Groups Discovery
  - attack.technique: T1482 # Domain Trust Discovery
platforms:
  - windows
level: high # Nivel de severidad de la detección
references:
  - https://www.joeware.net/freetools/adfind/
  - https://attack.mitre.org/techniques/T1087/ # Account Discovery
  - https://attack.mitre.org/techniques/T1069/ # Permission Groups Discovery
  - https://attack.mitre.org/techniques/T1482/ # Domain Trust Discovery
  - https://attack.mitre.org/techniques/T1059/001/ # T1059.001: Command and Scripting Interpreter: Windows Command Shell
  - https://attack.mitre.org/techniques/T1059/002/ # T1059.002: Command and Scripting Interpreter: PowerShell