title: Acceso a Credenciales vía Pypykatz
id: "d8e9f0a1-b2c3-4d4e-5f6a-7b8c9d0e1f2a" # Nuevo ID generado
status: high
description: |
  Detecta el acceso a credenciales mediante la herramienta de código abierto Pypykatz. Pypykatz es una implementación de Mimikatz en Python (versión >= 3.6). Esta regla se basa en el monitoreo de la traza de llamadas del proceso LSASS, buscando patrones específicos de DLLs utilizadas por Pypykatz.
author: aguztynbassi
date: 2024/07/18
modified: 2024/07/18
logsource:
  product: windows
  service: sysmon
  category: process_access # Event ID 10 es ProcessAccess en Sysmon
detection:
  selection:
    EventID: 10 # Sysmon Event ID for ProcessAccess
    TargetImage|endswith: '\lsass.exe' # El proceso objetivo es LSASS
    CallTrace|contains: # Patrones de DLLs en la traza de llamadas
      - 'C:\Windows\SYSTEM32\ntdll.dll+'
      - 'C:\Windows\System32\KERNELBASE.dll+'
      - 'libffi-7.dll'
      - '_ctypes.pyd+'
      - 'python3*.dll+' # Coincide con python36.dll, python37.dll, etc.
  condition: selection
fields:
  - Timestamp
  - EventID
  - User
  - Computer
  - SourceImage # Proceso que accede a LSASS
  - TargetImage # LSASS.exe
  - CallTrace # La traza de llamadas
  - GrantedAccess # Los permisos concedidos
tags:
  - attack.tactic: TA0006 # Acceso a Credenciales
  - attack.technique: T1003 # Volcado de Credenciales del SO
  - attack.subtechnique: T1003.001 # Memoria LSASS
level: high # Nivel de severidad de la detección
