title: Credentials Capture via Rpcping Detected
id: j1k2l3m4-n5o6-7p8q-9r0s-t1u2v3w4x5y6 # Please generate a unique UUID for each rule
description: >
  Detects suspicious execution of `rpcping.exe` where the command line indicates
  attempts to trigger NTLM authentication or interact with named pipes (`ncacn_np`).
  This activity can be indicative of credential capture attempts (e.g., NTLM relay
  attacks), reconnaissance, or attempts to abuse RPC for network access.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/05/25 # Updated to current date
logsource:
  category: process_creation # Applicable for Sysmon EventID 1 or Windows Security Log 4688
  product: windows
  service: sysmon # Explicitly state Sysmon as the primary source for process events
detection:
  # Base selection for any rpcping.exe execution
  base_rpcping:
    EventID: 1 # Sysmon Event ID for Process Creation
    Image|endswith: '\rpcping.exe'
  # Selection for NTLM authentication attempt
  ntlm_auth_attempt:
    CommandLine|contains|all:
      - ' -u ' # Parameter for username (often combined with NTLM)
      - 'NTLM' # Explicitly specifies NTLM authentication
  # Selection for Named Pipe interaction
  named_pipe_interaction:
    CommandLine|contains|all:
      - ' -t ' # Parameter for transfer syntax/protocol sequence
      - 'ncacn_np' # Named Pipe protocol sequence
  # Optional: Filter for common legitimate rpcping usage if seen in your environment.
  # Legitimate use is often for network diagnostics by administrators or automated tools.
  filter_legitimate_usage:
    ParentImage|endswith:
      - '\cmd.exe' # Often used by admins for manual diagnostics
      - '\powershell.exe' # Often used by admins for manual diagnostics
      - '\mmc.exe' # Management console
      # Add other specific, known legitimate parent processes or automation tools
      # if they regularly use rpcping for benign purposes.
    CommandLine|contains|all: # Exclude if specific benign parameters are always present
      - ' -e ' # Endpoint parameter, often used in legitimate diagnostics
      - ' -o ' # Operation parameter, common for basic connectivity checks
  condition: base_rpcping and (ntlm_auth_attempt or named_pipe_interaction) and not filter_legitimate_usage
fields:
  - Image # The full path to rpcping.exe
  - CommandLine # The full command line used
  - ParentImage # The parent process that launched rpcping.exe
  - User # User account under which the process ran
  - ComputerName # Standard field name for the host
  - EventID # The Sysmon event ID (1)
  - RuleName # Sysmon specific field for rule matching
falsepositives:
  - Legitimate network diagnostics by IT administrators or network engineers.
  - Automated monitoring tools that check RPC connectivity.
  - Legacy applications that use specific RPC configurations for communication.
level: high # Setting to high as these specific parameters are strong indicators of malicious or highly suspicious activity.
tags:
  - attack.tactic: TA0005 # Defense Evasion
  - attack.tactic: TA0003 # Credential Access
  - attack.tactic: TA0011 # Discovery
  - attack.tactic: TA0008 # Lateral Movement
  - attack.technique: T1003 # OS Credential Dumping (if NTLM hashes are relayed)
references:
  - https://lolbas-project.github.io/lolbas/Binaries/Rpcping/ # LoLBas entry for Rpcping.exe
  - https://attack.mitre.org/techniques/T1003/ # MITRE ATT&CK T1003 (OS Credential Dumping)
  - https://learn.microsoft.com/en-us/windows-server/administration/windows-commands/rpcping # Microsoft Rpcping documentation
  - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon # Sysmon official page