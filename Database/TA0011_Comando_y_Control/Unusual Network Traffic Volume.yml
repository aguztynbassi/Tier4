title: Volumen de Tráfico de Red Inusual Detectado
id: "a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d" # Nuevo ID generado
status: experimental
description: |
  Detección de volumen de tráfico de red inusual que puede indicar exfiltración de datos.
author: aguztynbassi
date: 2025/05/24
modified: 2025/05/24
logsource:
  product: network # Fuente de logs de red (ej. firewalls, routers, colectores de NetFlow)
  service: netflow # O 'flow', 'firewall', 'proxy' dependiendo del tipo de log de tráfico
  category: network_traffic # Categoría general para logs de tráfico de red
detection:
  selection:
    # Campo que representa el tamaño del tráfico en bytes (ej. 'bytes_in', 'bytes_out', 'total_bytes', 'size')
    # Ajusta el nombre del campo 'bytes' según el esquema de tus logs.
    bytes: # O 'traffic_size', 'total_bytes', etc.
      gt: 1000000000 # Mayor a 1 GB (1,000,000,000 bytes)
  condition: selection # La condición es una simple selección basada en el volumen
fields:
  - Timestamp
  - source_ip # Dirección IP de origen del tráfico
  - dest_ip # Dirección IP de destino del tráfico
  - source_port # Puerto de origen
  - dest_port # Puerto de destino
  - protocol # Protocolo de la conexión (ej. TCP, UDP)
  - bytes # Volumen de bytes transferidos (campo utilizado en la detección)
tags:
  - attack.tactic: TA0011 # Exfiltración
  - attack.technique: T1071.001 # Exfiltración sobre Canal C2: Exfiltración sobre HTTP/HTTPS (técnica proporcionada, aunque el volumen es más general)
platforms:
  - network # Plataformas de red (firewalls, routers, etc.)
level: high # Nivel de severidad alto, ya que la exfiltración de datos es una actividad crítica.
references:
  - "https://www.splunk.com/en_us/blog/security/splunk-security-essentials-for-splunk-enterprise-security.html"
  - "https://www.splunk.com/en_us/blog/security/splunk-security-essentials-for-splunk-enterprise-security-part-2.html"
  - "https://www.splunk.com/en_us/blog/security/splunk-security-essentials-for-splunk-enterprise-security-part-3.html"
  - "https://www.splunk.com/en_us/blog/security/splunk-security-essentials-for-splunk-enterprise-security-part-4.html"