title: Bypass UAC via CMSTP Detected
id: a7e6c5d4-b3a2-1f0e-d9c8-7b6a5c4d3e2f # Replace with a newly generated UUID
description: >
  Detection of suspicious child processes spawned by automatically elevated instances
  of Microsoft Connection Manager Profile Installer (cmstp.exe). This activity
  is indicative of a User Account Control (UAC) bypass attempt leveraging CMSTP.exe.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/05/25 # Updated to current date
logsource:
  category: process_creation # Standard Sigma category for process creation events
  product: windows
  service: sysmon # Specifies Sysmon as the logging service
detection:
  selection:
    EventID: 1 # Sysmon Event ID for Process Creation
    ParentImage|endswith: '\cmstp.exe' # Standard field for parent process image
    CommandLine|contains|all: # CMSTP UAC bypass often involves specific command line arguments
      - '/s' # Silent mode
      - '/au' # Auto-install
      - '/ni' # No interaction
  # Filter for legitimate users or processes that might use cmstp.exe
  # This filter is a placeholder. You need to define specific users or groups
  # that are allowed to legitimately use cmstp.exe in your environment,
  # or list specific legitimate parent processes.
  filter_legitimate_users:
    User|endswith: # Example placeholder for users to exclude (e.g., system accounts or known service accounts)
      - '\SYSTEM'
      - '\LOCAL SERVICE'
      - '\NETWORK SERVICE'
      # - 'MYDOMAIN\LegitUser1'
      # - 'MYDOMAIN\LegitAdminGroup'
  condition: selection and not filter_legitimate_users
fields:
  - Image # The child process that was created by cmstp.exe
  - ParentImage # The parent process (cmstp.exe)
  - CommandLine # Full command line of the child process
  - User # User account under which the process ran
  - RuleName # Sysmon specific field for rule matching
falsepositives:
  - Legitimate software installations or updates that utilize CMSTP.exe for connection profile installations.
  - Custom scripts or automated deployments that legitimately use CMSTP.exe with these parameters.
level: high
tags:
  - attack.tactic: TA0004 # Privilege Escalation
  - attack.technique: T1548 # Abuse Elevation Control Mechanism
  - attack.technique: T1548.002 # Bypass User Account Control
  - attack.tactic: TA0005 # Defense Evasion
  - attack.technique: t1218.003 # Signed Binary Proxy Execution: CMSTP
references:
  - https://attack.mitre.org/techniques/T1548/002/ # MITRE ATT&CK T1548.002 (Bypass User Account Control)
  - https://attack.mitre.org/techniques/T1218/003/ # MITRE ATT&CK T1218.003 (Signed Binary Proxy Execution: CMSTP)
  - https://docs.microsoft.com/en-us/windows-server/networking/connections/top-cmd-reference # Microsoft CMSTP documentation
  - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon # Sysmon official page