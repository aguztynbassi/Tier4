title: UAC Bypass Attempt via Windows Directory Masquerading
id: 7c6b5a4d-e3f2-1a9b-8c7d-6e5f4d3c2b1a # Replace with a newly generated UUID
description: >
  Detection of a User Account Control (UAC) bypass attempt by masquerading as a
  Microsoft trusted Windows directory (e.g., using a space in "C:\Windows \System32").
  This technique manipulates legitimate paths to trick UAC mechanisms into
  elevating an untrusted executable.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/05/25 # Updated to current date
logsource:
  category: process_creation # Sysmon EventID 1 is for process creation
  product: windows
  service: sysmon # Specifies Sysmon as the logging service
detection:
  selection:
    EventID: 1 # Sysmon Event ID for Process Creation
    IntegrityLevel: 'High' # Process must be elevated to High integrity for this bypass
    Image|startswith: # Looking for the masqueraded paths
      - 'C:\Windows \System32\' # Note the space after 'Windows'
      - 'C:\Windows \SysWOW64\' # Note the space after 'Windows'
    # Consider adding exclusions for specific legitimate processes if they
    # somehow manage to create processes in such paths, though highly unlikely.
  condition: selection
fields:
  - Image # The process image that was created
  - CommandLine # The full command line of the process
  - IntegrityLevel # The integrity level of the process
  - User # User account under which the process ran
  - ComputerName # Standard field name for the host
  - RuleName # Sysmon specific field for rule matching
falsepositives:
  - Very low false positive rate expected as these paths are specifically abused.
  - Custom applications or scripts that intentionally use or interact with these specific masqueraded paths (highly unlikely in legitimate environments).
level: high
tags:
  - attack.tactic: TA0005 # Defense Evasion
  - attack.tactic: TA0004 # Privilege Escalation
  - attack.technique: T1548 # Abuse Elevation Control Mechanism
  - attack.technique: T1548.002 # Abuse Elevation Control Mechanism: Bypass User Account Control
  - attack.technique: T1036.004 # Masquerading: Disguise as Legitimate Process
references:
  - https://attack.mitre.org/techniques/T1548/002/ # MITRE ATT&CK T1548.002 (Bypass User Account Control)
  - https://attack.mitre.org/techniques/T1036/004/ # MITRE ATT&CK T1036.004 (Masquerading: Disguise as Legitimate Process)
  - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon # Sysmon official page