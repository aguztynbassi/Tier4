title: Accessibility Features - Registry Modification for Persistence/Privilege Escalation
id: t1u2v3w4-x5y6-7z8a-9b0c-d1e2f3g4h5i6 # Please generate a unique UUID for each rule
description: >
  Detects suspicious modifications to registry keys associated with Windows
  Accessibility Features, particularly within the 'Image File Execution Options' (IFEO)
  key. Adversaries commonly leverage this technique to establish persistence or
  escalate privileges by redirecting legitimate accessibility binaries (e.g., sethc.exe,
  utilman.exe) to execute malicious code, often gaining SYSTEM privileges at the login screen.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/05/25 # Updated to current date
logsource:
  category: registry_event # Applicable for Sysmon EventID 12, 13, 14
  product: windows
  service: sysmon # Explicitly state Sysmon as the primary source for registry events
detection:
  # Selection for any registry modification (Set, Create, Delete)
  # within the Image File Execution Options for common accessibility binaries.
  selection_ifeo_accessibility:
    EventID:
      - 12 # Registry object added or deleted
      - 13 # Registry value set
      - 14 # Registry object renamed (less common for this technique, but included for completeness)
    TargetObject|contains: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\'
    TargetObject|endswith: # Specific accessibility feature binaries targeted
      - '\sethc.exe\Debugger' # Sticky Keys
      - '\utilman.exe\Debugger' # Utility Manager
      - '\osk.exe\Debugger' # On-Screen Keyboard
      - '\magnify.exe\Debugger' # Magnifier
      - '\Narrator.exe\Debugger' # Narrator
      - '\ डिस्प्ले.exe\Debugger' # Display
      - '\dpiscaling.exe\Debugger' # DPI Scaling (less common for this specific attack, but potential)
      - '\StickyKeys.exe\Debugger' # Older Sticky Keys reference
      - '\AccessibilityCpl.exe\Debugger' # Accessibility control panel
  # Filter for known legitimate scenarios.
  # While this is a highly suspicious technique, some legitimate software (e.g., debuggers,
  # application compatibility tools) might legitimately use IFEO.
  filter_legitimate_debugger:
    TargetObject|contains: # Filter out legitimate debugger paths or known benign usage patterns
      - 'C:\Program Files\Windows Kits\10\Debuggers\' # Microsoft Debugging Tools for Windows
      - 'C:\Program Files (x86)\Windows Kits\10\Debuggers\'
      - 'C:\Program Files\YourCompany\AppDebug.exe' # Example: Specific legitimate debugging tool
    # Exclude specific, highly privileged system accounts that might legitimately configure IFEO.
    # User|startswith:
    #   - 'NT AUTHORITY\SYSTEM' # SYSTEM might legitimately configure IFEO during updates/installs
    #   - 'NT AUTHORITY\LOCAL SERVICE'
  # The original rule had 'User|contains: EXCLUDED_USERS'.
  # This is problematic for generic rules and better managed at the SIEM level.
  condition: selection_ifeo_accessibility and not filter_legitimate_debugger
fields:
  - EventID # Sysmon event ID (12, 13, 14)
  - TargetObject # The registry key/value that was modified
  - Details # The value written (if EventID 13)
  - Image # The process that performed the registry modification
  - User # User account that performed the modification
  - ComputerName # Standard field name for the host
  - RuleName # Sysmon specific field for rule matching
falsepositives:
  - Very rare legitimate software installations or updates that modify IFEO
    for accessibility features (e.g., application compatibility fixes).
  - Legitimate debugging tools or system administrators setting up debuggers
    for these specific executables (though highly uncommon for accessibility features).
  - Security software (EDR, AV) that might apply IFEO rules for protection.
level: critical # Setting to critical due to the direct implication of persistence and privilege escalation.
tags:
  - attack.tactic: TA0003 # Persistence
  - attack.tactic: TA0004 # Privilege Escalation
  - attack.technique: T1546.008 # Event Triggered Execution: Accessibility Features
  - attack.technique: T1546 # Event Triggered Execution
references:
  - https://attack.mitre.org/techniques/T1546/008/ # MITRE ATT&CK T1546.008 (Accessibility Features)
  - https://docs.microsoft.com/en-us/sysinternals/downloads/sysmon # Sysmon official page
  - https://docs.microsoft.com/en-us/windows/win32/debug/image-file-execution-options # Microsoft IFEO documentation