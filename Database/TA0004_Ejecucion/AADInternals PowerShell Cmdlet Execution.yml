title: AADInternals PowerShell Cmdlet Execution
id: 8b3a1d9c-5e4f-3c2b-1a0d-9f8e7c6b5a4d # Replace with a newly generated UUID for your specific rule
description: >
  Detection has identified the execution of AADInternals cmdlets.
  AADInternals (S0677) is a PowerShell toolkit equipped with tools designed for the administration and
  security testing of Azure AD and Office 365.
  Adversaries exploit AADInternals to extract credentials from systems where AAD Connect is installed,
  potentially compromising the Azure AD environment.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/04/05
logsource:
  product: windows
  service: powershell # For PowerShell operational logs
  definition: PowerShell logs must be configured for script block logging (Event ID 4104).
detection:
  selection:
    EventID: 4104
    # The 'AADINTERNALS_CMDLETS' is a placeholder. You need to define the actual keywords
    # or patterns associated with AADInternals cmdlets in the ScriptBlockText field.
    # Examples of common AADInternals cmdlets/keywords:
    ScriptBlockText|contains|all: # Use |contains|all if looking for multiple keywords in one block
      - 'AADInternals'
      - 'Get-AADInt' # Common prefix for AADInternals cmdlets
    # Example for specific cmdlets (adjust as needed based on common usage):
    # ScriptBlockText|contains:
    #   - 'Get-AADIntToken'
    #   - 'Get-AADIntCredentials'
    #   - 'Export-AADIntSyncConfiguration'
    #   - 'Invoke-AADIntSyncPasswordHashDump'
    #   - 'Get-AADIntOrphanedDevices'
    #   - 'Install-AADIntDirSyncServer'
  condition: selection
fields:
  - ScriptBlockText
  - SubjectUserName # Common field for user in PowerShell logs
  - ComputerName # Common field for host in PowerShell logs
  - CommandLine # Where the command line that executed the script might be found
falsepositives:
  - Legitimate security testing or administration by authorized personnel.
  - Development activities using AADInternals in a controlled environment.
level: high
tags:
  - attack.tactic: TA0004 # Privilege Escalation
  - attack.technique: T1059 # Command and Scripting Interpreter
  - attack.technique: T1059.001 # PowerShell
references:
  - https://github.com/Gerenios/AADInternals # AADInternals GitHub repository
  - https://attack.mitre.org/software/S0677/ # MITRE ATT&CK Software (AADInternals)
  - https://attack.mitre.org/techniques/T1059/001/ # MITRE ATT&CK T1059.001 (PowerShell)