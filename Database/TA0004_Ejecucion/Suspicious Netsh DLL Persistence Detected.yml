title: Detecta Persistencia Sospechosa de DLL de Netsh
id: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d" # Nuevo ID generado
status: high
description: |
  Detecta la persistencia a través de Netsh Helper, lo que indica la adición de un DLL auxiliar malicioso a Netsh. Los atacantes pueden usar esta técnica para mantener el acceso o ejecutar código.
author: aguztynbassi
date: 2024/07/18
modified: 2024/07/18
logsource:
  product: windows
  service: sysmon
  category: process_creation
detection:
  selection:
    EventID: 1 # Sysmon Event ID para creación de proceso
    Image|endswith: '\netsh.exe'
    CommandLine|contains:
      - '*add*'
      - '*helper*'
  filter_users:
    User|startswith: # Excluir cuentas del sistema y de servicio
      - 'NT AUTHORITY\'
      - 'LOCAL SERVICE'
      - 'NETWORK SERVICE'
      # Considerar añadir más usuarios o grupos legítimos que puedan generar esta actividad de forma autorizada.
  condition: selection AND NOT filter_users
fields:
  - EventID
  - Timestamp
  - Image # Ruta completa del ejecutable
  - CommandLine
  - User
  - Computer
  - ParentImage
tags:
  - attack.tactic: TA0003 # Persistencia
  - attack.tactic: TA0004 # Escalada de Privilegios
  - attack.technique: T1547 # Ejecución de Inicio de Arranque o Inicio de Sesión
  - attack.subtechnique: T1547.001 # Claves de Registro de Ejecución / Carpeta de Inicio
level: high # Nivel de severidad de la detección
