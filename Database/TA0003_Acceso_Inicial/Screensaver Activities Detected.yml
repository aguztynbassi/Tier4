title: Actividad de Salvapantallas Detectada
id: "c7d8e9f0-1a2b-3c4d-5e6f-0123456789ab" # Nuevo ID generado
status: high
description: |
  Detecta la modificación de la clave de registro que contiene la ruta al binario utilizado como ejecutable del salvapantallas, lo que los adversarios pueden usar para establecer persistencia.
author: aguztynbassi
date: 2024/07/18
modified: 2024/07/18
logsource:
  product: windows
  service: sysmon
  category: registry # Event IDs 12, 13, 14 son eventos de registro
detection:
  selection:
    EventID:
      - 12 # Registry object added
      - 13 # Registry value set
      - 14 # Registry key or value renamed
    TargetObject|contains: '*\\Control Panel\\Desktop\\SCRNSAVE.exe'
  filter_legitimate_processes:
    ParentCommandLine|contains: '*explorer.exe*'
    Image|endswith: '*rundll32.exe'
    CommandLine|contains: '*shell32.dll, Control_RunDLL desk.cpl, ScreenSaver, *'
  filter_excluded_users:
    User|startswith: # Excluir cuentas del sistema y de servicio. Ajustar según el entorno.
      - 'NT AUTHORITY\'
      - 'LOCAL SERVICE'
      - 'NETWORK SERVICE'
      # Añadir otros usuarios o grupos legítimos que puedan realizar estas acciones.
  condition: selection AND NOT filter_legitimate_processes AND NOT filter_excluded_users
fields:
  - EventID
  - Timestamp
  - User
  - Computer
  - Image # Proceso que realiza el cambio
  - ParentImage # Proceso padre
  - CommandLine # Línea de comandos completa
  - TargetObject # Clave de registro modificada
  - Details # Detalles del cambio de registro (si están disponibles)
tags:
  - attack.tactic: TA0003 # Persistencia
  - attack.technique: T1546 # Ejecución de Inicio de Arranque o Inicio de Sesión
  - attack.technique: T1546.002 # Ejecución de Inicio de Arranque o Inicio de Sesión: Salvapantallas
falsepositives:
  - Actividades legítimas de usuarios que cambian su salvapantallas a uno personalizado.
  - Software de gestión de escritorio o políticas de grupo que establecen o gestionan salvapantallas.
  - Instalaciones de salvapantallas de terceros que colocan archivos `.scr` en ubicaciones no estándar.
level: high # Nivel de severidad de la detección
references:
  - https://attack.mitre.org/techniques/T1546/002/
  - https://docs.microsoft.com/en-us/sysinternals/downloads/sysmon
  - https://www.fireeye.com/blog/threat-research/2020/04/abusing-screensaver-executable-for-persistence.html
  - https://www.redcanary.com/blog/screen-saver-persistence/