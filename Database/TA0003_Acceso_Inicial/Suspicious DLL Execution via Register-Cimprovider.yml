title: Suspicious DLL Execution via Register-Cimprovider
id: r1s2t3u4-v5w6-7x8y-9z0a-b1c2d3e4f5g6 # Please generate a unique UUID for each rule
description: >
  Detects the loading or execution of a DLL using the legitimate Windows utility
  `Register-CimProvider.exe`. This activity is highly suspicious as adversaries
  commonly abuse this Living Off The Land Binary (LOLBIN) to achieve defense
  evasion, persistence, or arbitrary code execution by registering malicious
  WMI (Windows Management Instrumentation) providers.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/05/25 # Updated to current date
logsource:
  category: process_creation # Applicable for Sysmon EventID 1 or Windows Security Log 4688
  product: windows
  service: sysmon # Explicitly state Sysmon as the primary source for process events
detection:
  selection:
    EventID: 1 # Sysmon Event ID for Process Creation
    Image|endswith: '\register-cimprovider.exe'
    CommandLine|contains:
      - '-Path' # Parameter specifying the path to the DLL
      - '.dll' # Indicates a DLL file is being referenced
      - '-Namespace' # Often used when registering a new CIM provider
      - '-WmiNamespace' # Alternative for Namespace
  # Filter for known legitimate scenarios.
  # While rare, some legitimate system components or enterprise software might
  # programmatically register CIM providers. This filter needs tuning.
  filter_legitimate_usage:
    ParentImage|endswith: # Exclude if launched by common system management tools
      - '\powershell.exe' # Legitimate administrators might use PowerShell to call this
      - '\mmc.exe' # Management Console
      - '\msdt.exe' # Microsoft Support Diagnostic Tool might register providers
      - '\wmiprvse.exe' # WMI Provider Host, although less common as a direct parent
      # Add specific paths or patterns if legitimate applications in your environment
      # use Register-CimProvider.exe for benign purposes.
    CommandLine|contains: # Whitelist specific, known legitimate DLL paths
      - 'C:\Windows\System32\' # If a system DLL is legitimately registered
      - 'C:\Program Files\Microsoft Visual Studio\Shared\Tools\DiagnosticsHub\Microsoft.DiagnosticHub.StandardCollector.dll' # Example of a legitimate DLL registered by MS tools
      # Add other specific, known legitimate DLL paths or namespaces
      # - '-Namespace root\CompanyName\Product'
  condition: selection and not filter_legitimate_usage
fields:
  - Image # The full path to register-cimprovider.exe
  - CommandLine # The full command line used
  - ParentImage # The parent process that launched register-cimprovider.exe
  - User # User account under which the process ran
  - ComputerName # Standard field name for the host
  - EventID # The Sysmon event ID (1)
  - RuleName # Sysmon specific field for rule matching
falsepositives:
  - Legitimate system updates, installations, or uninstallation processes that
    register/unregister WMI providers.
  - Development environments where developers are creating or testing WMI providers.
  - Very rare cases of legitimate third-party software that custom-registers CIM providers.
level: high # Setting to high due to the strong correlation with malicious activity. Requires tuning.
tags:
  - attack.tactic: TA0005 # Defense Evasion
  - attack.tactic: TA0003 # Persistence
  - attack.technique: T1546.003 # WMI Event Subscription (T1546.003)
  - attack.technique: T1218 # Signed Binary Proxy Execution (Register-CimProvider.exe is a signed binary)
references:
  - https://lolbas-project.github.io/lolbas/Binaries/Register-Cimprovider/ # LoLBas entry for Register-Cimprovider.exe
  - https://attack.mitre.org/techniques/T1546/003/ # MITRE ATT&CK T1546.003 (WMI Event Subscription)
  - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon # Sysmon official page
  - https://learn.microsoft.com/en-us/windows/win32/wmisdk/registering-a-provider # Microsoft Register-CimProvider documentation