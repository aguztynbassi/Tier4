title: Active Directory Schema or Critical Object Change Detected
id: w1x2y3z4-a5b6-7c8d-9e0f-1g2h3i4j5k6l # Please generate a unique UUID for each rule
description: >
  Detects creation, modification, deletion, undeletion, or movement of objects
  within the Active Directory directory service. While some changes are legitimate,
  unusual or unapproved modifications, especially to critical objects or the schema,
  can indicate malicious activity such as persistence mechanisms (e.g., custom
  attributes for backdoors), privilege escalation attempts (e.g., modifying ACLs),
  or staging for credential access. This rule focuses on general directory
  service changes, with a strong emphasis on schema modifications.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/05/25 # Updated to current date
logsource:
  category: directory_service_change # Consistent with previous rules for 5136-5141
  product: windows
  service: security # Windows Security event logs
detection:
  # Selection for various directory service modification events.
  # These EventIDs cover object changes, creations, deletions, etc.
  selection_event_ids:
    EventID:
      - 5136 # A directory service object was modified.
      - 5137 # A directory service object was created.
      - 5138 # A directory service object was undeleted.
      - 5139 # A directory service object was moved.
      - 5141 # A directory service object was deleted.
  # Additional selection to specifically target schema modifications.
  # Schema modifications are extremely rare in a stable environment and highly suspicious.
  selection_schema_changes:
    EventID:
      - 5136 # Object modified
      - 5137 # Object created
      - 5141 # Object deleted
    ObjectDN|contains: 'CN=Schema,CN=Configuration,DC=' # Targets schema partition changes
    # You might also look for specific LDIF operations if you have a separate parser for that,
    # but EventIDs on the Schema partition are generally sufficient.
  # Filter for known legitimate accounts or processes that perform routine AD changes.
  # This is crucial for avoiding false positives.
  filter_legitimate_accounts:
    # Exclude well-known system accounts or service accounts for routine AD operations
    SubjectUserName|endswith: '$' # Excludes machine accounts (DCs replicating, AAD Connect)
    SubjectUserName|startswith:
      - 'MSOL_' # Azure AD Connect accounts
      - 'AAD_' # Azure AD Connect accounts
    # Exclude specific, known administrative accounts for *approved* changes
    # SubjectUserName|in:
    #   - 'DOMAIN\AdminAccount_AD_MGMT'
    #   - 'DOMAIN\BackupServiceAccount'
    # Exclude changes by specific tools or applications known to make legitimate AD changes
    # You may need to look at 'ProcessName' or 'SourceProcessName' if your SIEM extracts it for 5136+ events
    # Example for Azure AD Connect Sync Service:
    # ProcessName|endswith: '\miiserver.exe'
  condition: (selection_event_ids or selection_schema_changes) and not filter_legitimate_accounts
fields:
  - EventID # The specific event ID
  - SubjectUserName # The user account that initiated the change
  - SubjectDomainName
  - ObjectDN # The distinguished name of the modified object
  - ObjectClass # The class of the object (e.g., 'user', 'group', 'container', 'schemaClass')
  - OperationType # For EventID 5136, indicates 'Value Added', 'Value Deleted', 'Value Modified'
  - AttributeLDAPDisplayName # For EventID 5136, the specific attribute changed
  - AttributeValue # For EventID 5136, the new value of the attribute
  - ComputerName # The domain controller where the event occurred
  - ParentProcessName # If available, the process that performed the change
falsepositives:
  - Legitimate administrative changes (creating users/groups, modifying attributes). This is the biggest source of FPs.
  - Automated provisioning systems, identity management solutions (e.g., Azure AD Connect), or backup solutions.
  - Software installations or updates that extend the Active Directory schema (rare but legitimate).
  - Domain controller promotion/demotion.
level: high # Setting to high. While legitimate changes occur, unapproved changes are critical.
tags:
  - attack.tactic: TA0003 # Persistence
  - attack.tactic: TA0004 # Privilege Escalation
  - attack.tactic: TA0006 # Credential Access
  - attack.tactic: TA0005 # Defense Evasion
  - attack.technique: T1484 # Domain Policy Modification (if GPOs are changed)
  - attack.technique: T1556 # Password Policy Modification (if password policy is changed)
  - attack.technique: T1098 # Account Manipulation (general)
references:
  - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-id-5136 # MS Event ID 5136
  - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-id-5137 # MS Event ID 5137
  - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-id-5138 # MS Event ID 5138
  - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-id-5139 # MS Event ID 5139
  - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-id-5141 # MS Event ID 5141
  - https://adsecurity.org/?p=2056 # Detecting AD attacks