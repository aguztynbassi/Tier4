title: Suspicious Microsoft Equation Editor Child Process
id: c6f5e4d3-b2a1-0987-6543-210fedcba987 # Replace with a newly generated UUID for your specific rule
description: >
  A suspicious child process of Microsoft's Equation Editor is detected,
  possibly indicating exploitation of CVE-2017-11882.
  CVE-2017-11882 is a memory corruption vulnerability in Microsoft Office's Equation Editor component,
  which allows remote code execution.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/05/25 # Updated to current date
logsource:
  category: process_creation # Standard Sigma category for process creation events
  product: windows
  service: sysmon # Specifies Sysmon as the logging service
detection:
  selection:
    EventID: 1 # Sysmon Event ID for Process Creation
    ParentImage|endswith: '\EQNEDT32.exe' # Standard field for parent process image
  filter_legitimate_werfault:
    Image|endswith: '\WerFault.exe' # Standard field for process image
    Image|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Windows\SysWOW64\'
  condition: selection and not filter_legitimate_werfault
fields:
  - Image # The child process that was created
  - ParentImage # The parent process (EQNEDT32.exe)
  - CommandLine # Command line of the child process
  - User # User account under which the process ran
  - RuleName # Sysmon specific field for rule matching
falsepositives:
  - Legitimate crash reporting by WerFault.exe when EQNEDT32.exe crashes.
level: high
tags:
  - attack.tactic: TA0002 # Execution
  - attack.technique: T1203 # Exploitation for Client Execution
references:
  - https://nvd.nist.gov/vuln/detail/CVE-2017-11882 # NVD entry for CVE-2017-11882
  - https://portal.msrc.microsoft.com/en-US/security-guidance/advisory/CVE-2017-11882 # Microsoft Security Response Center advisory
  - https://attack.mitre.org/techniques/T1203/ # MITRE ATT&CK T1203 (Exploitation for Client Execution)
  - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon # Sysmon official page