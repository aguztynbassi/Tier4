title: Ejecución de la Herramienta PsExec Detectada
id: "e1f2g3h4-i5j6-4k7l-8m9n-0o1p2q3r4s5t" # Nuevo ID generado
status: high
description: |
  Detecta eventos de instalación y ejecución del servicio PsExec (PSEXESVC), tanto a través de los logs de servicio de Windows como de Sysmon. Esta actividad es un indicador común de movimiento lateral y ejecución remota por parte de los adversarios.
author: aguztynbassi
date: 2024/07/18
modified: 2024/07/18
logsource:
  product: windows
  service:
    - security # Para EventIDs 7045, 7036
    - sysmon   # Para EventID 1
  category:
    - service_control
    - process_creation
detection:
  selection_service_install:
    EventID: 7045 # Un servicio fue instalado en el sistema.
    ServiceName: 'PSEXESVC'
  selection_service_start:
    EventID: 7036 # Un servicio fue iniciado o detenido.
    ServiceName: 'PSEXESVC'
  selection_sysmon_process_creation:
    EventID: 1 # Creación de proceso (Sysmon)
    Image|endswith: '\PSEXESVC.exe'
    User: 'NT AUTHORITY\SYSTEM' # PsExec se ejecuta como SYSTEM
  filter_excluded_users:
    User|startswith: # Excluye cuentas de sistema y de servicio. Ajustar según el entorno.
      - 'NT AUTHORITY\'
      - 'LOCAL SERVICE'
      - 'NETWORK SERVICE'
      # Añadir otros usuarios o grupos legítimos que puedan generar esta actividad de forma autorizada.
  condition: (selection_service_install OR selection_service_start OR selection_sysmon_process_creation) AND NOT filter_excluded_users
fields:
  - Timestamp
  - EventID
  - User
  - ComputerName
  - ServiceName    # Para eventos de servicio
  - ServiceFileName # Para eventos de servicio (si está disponible)
  - Image          # Para eventos de Sysmon
  - CommandLine    # Para eventos de Sysmon
  - ParentImage    # Para eventos de Sysmon
tags:
  - attack.tactic: TA0002 # Ejecución
  - attack.technique: T1569 # Ejecución de Servicios
  - attack.technique: T1569.002 # Ejecución de Servicios: Servicio Remoto
level: high # Nivel de severidad de la detección
references:
  - https://learn.microsoft.com/en-us/windows/security/threat-protection/auditing/event-7045
  - https://learn.microsoft.com/en-us/windows/security/threat-protection/auditing/event-7036
  - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon
  - https://attack.mitre.org/techniques/T1569/002/
  - https://www.elastic.co/guide/en/security/current/detection-engine-rules-dsl-reference.html
  - https://www.elastic.co/guide/en/security/current/detection-engine-rules-field-reference.html
  - https://www.elastic.co/blog/detecting-lateral-movement-with-elastic-security