title: Procesos Shell Sospechosos Generados por SQL Server
id: "f2g3h4i5-j6k7-4l8m-9n0o-1p2q3r4s5t6u" # Nuevo ID generado
status: high
description: |
  Se detecta un proceso shell sospechoso generado por el proceso de SQL Server, lo que puede indicar la explotación de una vulnerabilidad.
author: aguztynbassi
date: 2024/07/18
modified: 2024/07/18
logsource:
  product: windows
  service: security # Event ID 4688 es un evento de creación de proceso de Windows Security.
  category: process_creation
detection:
  selection:
    EventID: 4688 # Event ID for "A new process has been created."
    ParentImage|endswith: '\sqlservr.exe' # The parent process is sqlservr.exe
    Image|endswith: # The spawned process is a suspicious shell or tool
      - '\cmd.exe'
      - '\powershell.exe'
      - '\bash.exe'
      - '\sh.exe'
      - '\bitsadmin.exe'
  # Optional: Further refine by specific SQL Server paths and command line patterns
  # This section implements the complex 'OR' logic from the original query
  specific_sql_paths_and_cmd:
    ParentImage|contains:
      - 'C:\Program Files\Microsoft SQL Server\'
      - 'DATEV_DBENGINE\MSSQL\Binn\sqlservr.exe'
    Image|endswith: 'C:\Windows\System32\cmd.exe'
    CommandLine|contains: '"C:\Windows\system32\cmd.exe" *'
  condition: selection AND (NOT specific_sql_paths_and_cmd) # Adjust based on whether specific_sql_paths_and_cmd is an inclusion or exclusion
                                                             # Assuming the original query implies that the specific path/cmd is *also* suspicious.
                                                             # If it's an exclusion, change to `NOT specific_sql_paths_and_cmd`
fields:
  - Timestamp
  - EventID
  - User
  - Computer
  - ParentImage # Path of the parent process (sqlservr.exe)
  - Image # Path of the spawned process
  - CommandLine # Full command line of the spawned process
tags:
  - attack.tactic: TA0001 # Initial Access
  - attack.tactic: TA0002 # Execution
  - attack.technique: T1190 # Exploit Public-Facing Application
  - attack.technique: T1059.001 # Command and Scripting Interpreter: PowerShell (or other shells)
level: high # Severity level of the detection
references:
  - https://docs.microsoft.com/en-us/sql/relational-databases/security/sql-server-security?view=sql-server-ver15 # SQL Server Security Documentation
  - https://attack.mitre.org/techniques/T1190/ # T1190: Exploit Public-Facing Application
  - https://attack.mitre.org/techniques/T1059/001/ # T1059.001: Command and Scripting Interpreter: Windows Command Shell
  - https://www.cisa.gov/uscert/ncas/alerts/aa20-245a # CISA Alert on SQL Server vulnerabilities
  - https://www.fireeye.com/blog/threat-research/2020/04/malicious-windows-crash-dumps.html # FireEye on malicious dumps and exploitation