title: MSHTA Spawning Windows Shell or Scripting Tools Detected
id: l1m2n3o4-p5q6-7r8s-9t0u-v1w2x3y4z5a6 # Please generate a unique UUID for each rule
description: >
  Detects the execution of Windows command shells or scripting tools (e.g., cmd.exe,
  PowerShell.exe, wscript.exe) when initiated as child processes of `mshta.exe`.
  This behavior is highly indicative of malicious activity, as `mshta.exe` is a
  common Living Off The Land Binary (LOLBIN) abused by adversaries for initial
  access, defense evasion, and indirect execution of malicious code, often from
  HTML Applications or embedded scripts.
status: experimental
author: aguztynbassi
date: 2025/04/05
modified: 2025/05/25 # Updated to current date
logsource:
  category: process_creation # Applicable for Sysmon EventID 1 or Windows Security Log 4688
  product: windows
  service: sysmon # Explicitly state Sysmon as the primary source for process events
detection:
  selection:
    EventID: 1 # Sysmon Event ID for Process Creation
    ParentImage|endswith: '\mshta.exe'
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe' # PowerShell Core
      - '\wscript.exe'
      - '\cscript.exe'
      - '\sh.exe' # WSL/Linux shell
      - '\bash.exe' # WSL/Linux shell
      - '\reg.exe'
      - '\regsvr32.exe'
      - '\BITSADMIN.exe'
      - '\certutil.exe' # Commonly abused for downloads/encoding
      - '\schtasks.exe' # For persistence
      - '\net.exe' # Network commands
      - '\net1.exe' # Network commands (legacy)
      - '\sc.exe' # Service control
  # Filter for known legitimate scenarios. While MSHTA spawning shells is rare for benign use,
  # some specific enterprise applications might (unusually) leverage it.
  filter_legitimate_apps:
    ParentCommandLine|contains: # Whitelist specific legitimate HTA paths/names
      - 'C:\Program Files\YourCompanyApp\legit.hta'
      - 'C:\Tools\AdminScript.hta'
      # Example: Filter if a specific internal tool is known to legitimately spawn these
      # ParentImage|startswith: 'C:\Program Files\YourLegitSoftware\'
    # The original rule had 'User|in: EXCLUDED_USERS'.
    # While potentially useful for specific environments, defining EXCLUDED_USERS directly in a generic
    # Sigma rule is problematic. It's better to manage user-based exclusions at the SIEM level
    # or provide a placeholder for specific role accounts in the description.
  condition: selection and not filter_legitimate_apps
fields:
  - ParentImage # The full path to mshta.exe
  - Image # The full path to the spawned process
  - CommandLine # The full command line of the spawned process
  - ParentCommandLine # The full command line of mshta.exe
  - User # User account under which the process ran
  - ComputerName # Standard field name for the host
  - EventID # The Sysmon event ID (1)
  - RuleName # Sysmon specific field for rule matching
falsepositives:
  - Very rare legitimate IT administration scripts or legacy applications that
    might unusually leverage MSHTA to launch shell commands. These should be
    thoroughly investigated and explicitly whitelisted.
level: high # Setting to high due to the strong correlation with malicious activity.
tags:
  - attack.tactic: TA0005 # Defense Evasion
  - attack.tactic: TA0002 # Execution
  - attack.technique: T1218 # Signed Binary Proxy Execution
  - attack.technique: T1218.005 # Signed Binary Proxy Execution (Mshta)
references:
  - https://attack.mitre.org/techniques/T1218/005/ # MITRE ATT&CK T1218.005 (Mshta)
  - https://lolbas-project.github.io/lolbas/Binaries/Mshta/ # LoLBas entry for Mshta.exe
  - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon # Sysmon official page