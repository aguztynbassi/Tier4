title: Ejecución de PowerShell ADRecon Detectada
id: "g9h0i1j2-k3l4-4m5n-6o7p-8q9r0s1t2u3v" # Nuevo ID generado
status: high
description: |
  Detecta la ejecución del script de PowerShell ADRecon para el reconocimiento de Active Directory. Se informa que el script es utilizado activamente por FIN7. Para que la alerta funcione, el registro de bloques de script debe estar habilitado.
author: aguztynbassi
date: 2024/07/18
modified: 2024/07/18
logsource:
  product: windows
  service: powershell # Event ID 4104 es un evento de PowerShell Script Block Logging.
  category: scripting
detection:
  selection:
    EventID: 4104 # PowerShell Script Block Logging
    ScriptBlockText|contains: # Contiene patrones de script específicos de ADRecon
      - '*Function Get-ADRExcelComOb*'
      - '*ADRecon-Report.xlsx*'
  filter_excluded_users:
    User|startswith: # Excluye cuentas del sistema y de servicio. Ajustar según el entorno.
      - 'NT AUTHORITY\'
      - 'LOCAL SERVICE'
      - 'NETWORK SERVICE'
      # Añadir otros usuarios o grupos legítimos que puedan generar esta actividad de forma autorizada.
  condition: selection AND NOT filter_excluded_users
fields:
  - Timestamp
  - EventID
  - User
  - ComputerName
  - ScriptBlockText # El contenido completo del script de PowerShell
  - ProcessName # El proceso que ejecuta PowerShell (powershell.exe)
tags:
  - attack.tactic: TA0002 # Ejecución
  - attack.technique: T1059 # Intérprete de Comandos y Scripts
  - attack.subtechnique: T1059.001 # PowerShell
platforms:
  - windows
level: high # Nivel de severidad de la detección
