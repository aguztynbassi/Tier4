title: Ejecución a través del Host de Scripts de Windows
id: "68c9e7a1-b2d4-4f0e-8c1d-2a3b4c5d6e7f" # Nuevo ID generado
status: high
description: |
  Detecta la ejecución de archivos de script (por ejemplo, VBS, JS) utilizando `wscript.exe` o `cscript.exe`, lo que puede indicar actividad maliciosa.
author: aguztynbassi
date: 2025/04/12
modified: 2025/04/12
logsource:
  product: windows
  service: sysmon
  category: process_creation
detection:
  selection:
    EventID: 1 # ID de evento de creación de proceso de Sysmon
    Image|endswith:
      - '\wscript.exe'
      - '\cscript.exe'
    CommandLine|contains:
      - '.vbs'
      - '.js'
      - '.vbe'
      - '.jse'
  exclusion:
    User|startswith: 'NT AUTHORITY\' # Excluye cuentas del sistema
  condition: selection and not exclusion
fields:
  - EventID
  - Timestamp
  - Image
  - CommandLine
  - User
  - Computer
tags:
  - attack.tactic: TA0002 # Ejecución
  - attack.technique: T1059 # Intérprete de Comandos y Scripts
  - attack.technique: T1059.005 # Visual Basic
  - attack.technique: T1059.007 # JavaScript
platforms:
  - windows
level: high # Nivel de severidad de la detección
