title: Proceso Hijo Sospechoso de VMToolsd Detectado
id: "b5c6d7e8-f9a0-4b1c-2d3e-4f5a6b7c8d9e" # Nuevo ID generado
status: high
description: |
  Detecta la creación de un proceso hijo sospechoso del proceso de VMware Tools (vmtoolsd.exe), lo que puede indicar una persistencia establecida por atacantes.
author: aguztynbassi
date: 2024/07/18
modified: 2024/07/18
logsource:
  product: windows
  service: security # Event ID 4688 es un evento de creación de proceso de Windows Security.
  category: process_creation
detection:
  selection:
    EventID: 4688 # Event ID para "Se ha creado un nuevo proceso."
    ParentImage|endswith: '\vmtoolsd.exe' # El proceso padre es vmtoolsd.exe
    Image|endswith: # El proceso hijo es uno de los siguientes binarios de script/ejecución
      - '\cmd.exe'
      - '\powershell.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\rundll32.exe'
      - '\regsvr32.exe'
  filter_legitimate_scripts:
    CommandLine|contains: # Excluye los scripts legítimos de VMware Tools
      - '\VMware\VMware Tools\poweron-vm-default.bat*'
      - '\VMware\VMware Tools\poweroff-vm-default.bat*'
      - '\VMware\VMware Tools\resume-vm-default.bat*'
      - '\VMware\VMware Tools\suspend-vm-default.bat*'
  condition: selection AND NOT filter_legitimate_scripts
fields:
  - Timestamp
  - EventID
  - User
  - Computer
  - ParentImage # Ruta de la imagen del proceso padre
  - Image # Ruta de la imagen del proceso hijo
  - CommandLine # Línea de comandos completa del proceso hijo
tags:
  - attack.tactic: TA0002 # Ejecución
  - attack.technique: T1059 # Intérprete de Comandos y Scripts
level: high # Nivel de severidad de la detección
references:
  - https://www.vmware.com/support/developer/vmtools-sdk/ # Documentación de VMware Tools SDK
  - https://www.vmware.com/security/advisories/VMSA-2021-0010.html # Aviso de seguridad de VMware
  - https://attack.mitre.org/techniques/T1059/001/ # T1059.001: Command and Scripting Interpreter: Windows Command Shell
  - https://attack.mitre.org/techniques/T1059/002/ # T1059.002: Command and Scripting Interpreter: PowerShell
  - https://attack.mitre.org/techniques/T1059/003/ # T1059.003: Command and Scripting Interpreter: Windows Script Host