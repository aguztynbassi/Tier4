title: Transferencia FTP Sospechosa
id: "p7q8r9s0-t1u2-3v4w-5x6y-7z8a9b0c1d2e" # Nuevo ID generado
status: experimental
description: |
  Detección de transferencias FTP inusuales que pueden indicar exfiltración de datos.
  Esta regla busca transferencias FTP de gran tamaño (más de 100 MB) que podrían
  ser un indicador de datos siendo exfiltrados de la red.
author: aguztynbassi
date: 2025/05/24
modified: 2025/05/24
logsource:
  category: network # Categoría de logs de red
  service: ftp # Servicio específico de FTP
  product: any # Puede ser cualquier producto que genere logs de FTP (ej. firewalls, proxies, servidores FTP)
detection:
  selection:
    # El campo que contiene la cantidad de bytes transferidos.
    # Se asume que 'bytes_transferred' es el nombre del campo en los logs.
    bytes_transferred: # El campo debe ser numérico
      - '>100000000' # Más de 100 MB (100 * 1024 * 1024 = 104857600, pero la query original usa 100000000)
                      # Usamos el valor de la query original para consistencia.
  condition: selection
fields:
  - Timestamp
  - source_ip # La dirección IP de origen de la transferencia
  - destination_ip # La dirección IP de destino de la transferencia
  - source_port # El puerto de origen
  - destination_port # El puerto de destino (usualmente 20 o 21 para FTP)
  - user # El usuario de FTP que realizó la transferencia
  - filename # El nombre del archivo transferido
  - bytes_transferred # La cantidad de bytes transferidos
tags:
  - attack.tactic: TA0010 # Exfiltración
  - attack.technique: T1048.001 # Exfiltración sobre Protocolos Alternativos: FTP
platforms:
  - network # Plataformas de red que generan logs de FTP
level: high # Nivel de severidad alto, ya que es una actividad de exfiltración.
references:
  - https://attack.mitre.org/techniques/T1048/001/
  - https://www.sans.org/blog/detecting-data-exfiltration-over-ftp/
  - https://www.cisecurity.org/controls/network-traffic-analysis/