title: Copia de Archivos a Dispositivo Externo
id: "i2j3k4l5-m6n7-8o9p-0q1r-2s3t4u5v6w7x" # Nuevo ID generado
status: experimental
description: |
  Detecta archivos copiados a dispositivos externos, lo que puede indicar exfiltración de datos.
  Esta regla se basa en el Evento de Seguridad de Windows 4663, que audita el acceso a objetos.
author: aguztynbassi
date: 2025/05/24
modified: 2025/05/24
logsource:
  product: windows
  service: security
  category: file_access # O 'object_access' si es más específico en tu sistema
detection:
  selection:
    EventID: 4663 # Un intento de acceso a un objeto fue realizado.
    # El tipo de objeto accedido. Para dispositivos extraíbles, esto puede ser 'Removable Storage'
    # o 'File' con el ObjectName apuntando a una unidad extraíble (ej. D:\).
    # Por favor, verifica los valores exactos de ObjectType en tus logs de EventID 4663,
    # ya que 'RemovableMedia' es una extracción específica de Splunk.
    ObjectType: 'Removable Storage' # Asumiendo que 'RemovableMedia' de Splunk se mapea a esto.
    # El tipo de acceso realizado. 'WriteData' (o '%%1538') indica una operación de escritura.
    Accesses: 'WriteData' # O '%%1538' si tu sistema usa los códigos de acceso directamente.
  condition: selection
fields:
  - SubjectUserName # El usuario que realizó la acción
  - ObjectName # La ruta completa del archivo o directorio accedido
  - ObjectType # El tipo de objeto (ej. 'File', 'Removable Storage')
  - Accesses # El tipo de acceso (ej. 'WriteData')
  - IpAddress # Si el acceso fue remoto (no siempre presente para copias locales)
tags:
  - attack.tactic: TA0010 # Exfiltración
  - attack.technique: T1052 # Exfiltración sobre Medios Extraíbles
falsepositives:
  - Actividades legítimas de copia de archivos a dispositivos externos por parte de usuarios autorizados.
  - Transferencias de archivos realizadas por software de respaldo o sincronización.
  - Uso de dispositivos externos para almacenamiento temporal por parte de administradores.
platforms:
  - windows
level: high # Nivel de severidad alto, ya que es una actividad de exfiltración.
references:
  - https://attack.mitre.org/techniques/T1052/
  - https://www.sans.org/blog/detecting-data-exfiltration-to-removable-media/
  - https://www.cisecurity.org/controls/windows-security-configuration/