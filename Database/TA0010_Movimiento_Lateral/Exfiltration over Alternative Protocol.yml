title: Exfiltración sobre Protocolo Alternativo Detectada
id: "e7f8g9h0-i1j2-3k4l-5m6n-7o8p9q0r1s2t" # Nuevo ID generado
status: experimental
description: |
  Detección de exfiltración de datos utilizando protocolos no estándar o alternativos.
author: aguztynbassi
date: 2025/05/24
modified: 2025/05/24
logsource:
  product: network # Fuente de logs de red (ej. firewalls, routers, colectores de NetFlow)
  service: netflow # O 'flow', 'firewall', 'proxy' dependiendo del tipo de log de tráfico
  category: network_connection # O network_traffic para logs de conexión/tráfico
detection:
  selection:
    # Excluye los protocolos TCP y UDP, buscando cualquier otro protocolo.
    # Ajusta el nombre del campo 'protocol' si es diferente en tus logs (ej. 'transport_protocol', 'proto').
    protocol:
      - 'TCP'
      - 'UDP'
    # Campo que representa el tamaño del tráfico en bytes.
    # Ajusta el nombre del campo 'bytes_transferred' según el esquema de tus logs.
    bytes_transferred:
      gt: 100000000 # Mayor a 100 MB (100,000,000 bytes)
  condition: not selection.protocol and selection.bytes_transferred # La condición es la negación de TCP/UDP Y el volumen de bytes
fields:
  - Timestamp
  - source_ip # Dirección IP de origen del tráfico
  - dest_ip # Dirección IP de destino del tráfico
  - source_port # Puerto de origen
  - dest_port # Puerto de destino
  - protocol # Protocolo de la conexión
  - bytes_transferred # Volumen de bytes transferidos
tags:
  - attack.tactic: TA0010 # Exfiltración (según lo proporcionado, aunque T1048 a menudo se asocia con TA0011)
  - attack.technique: T1048 # Exfiltración sobre Protocolo Alternativo
falsepositives:
  - Actividades legítimas de transferencia de archivos grandes a través de protocolos no estándar, como aplicaciones personalizadas o sistemas de monitoreo que utilizan protocolos alternativos.
  - Transferencias de datos grandes por parte de aplicaciones empresariales que utilizan protocolos menos comunes.
  - Uso de protocolos personalizados para la comunicación entre sistemas internos.
platforms:
  - network # Plataformas de red (ej. firewalls, routers, sistemas de monitoreo de red)
level: high # Nivel de severidad alto, ya que la exfiltración de datos es una actividad crítica.
references:
  - "https://www.splunk.com/en_us/blog/security/splunk-security-essentials-for-splunk-enterprise-security.html"
  - "https://www.splunk.com/en_us/blog/security/splunk-security-essentials-for-splunk-enterprise-security-part-2.html"
  - "https://www.splunk.com/en_us/blog/security/splunk-security-essentials-for-splunk-enterprise-security-part-3.html"
  - "https://www.splunk.com/en_us/blog/security/splunk-security-essentials-for-splunk-enterprise-security-part-4.html"