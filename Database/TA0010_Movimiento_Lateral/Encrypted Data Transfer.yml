title: Transferencia de Datos Cifrados Detectada
id: "f9g0h1i2-j3k4-5l6m-7n8o-9p0q1r2s3t4u" # Nuevo ID generado
status: experimental
description: |
  Detección de transferencias de datos cifrados a direcciones IP externas con un volumen significativo.
author: aguztynbassi
date: 2025/05/24
modified: 2025/05/24
logsource:
  product: network # Fuente de logs de red (ej. firewalls, proxies, colectores de NetFlow)
  service: netflow # O 'flow', 'firewall', 'proxy' dependiendo del tipo de log de tráfico
  category: network_connection # O network_traffic para logs de conexión/tráfico
detection:
  selection:
    # Busca conexiones donde el puerto de destino es 443 (HTTPS/SSL/TLS).
    # Ajusta el nombre del campo 'dest_port' si es diferente en tus logs (ej. 'destination_port', 'dpt').
    dest_port: 443
    # Campo que representa el tamaño del tráfico en bytes.
    # Ajusta el nombre del campo 'bytes_transferred' según el esquema de tus logs.
    bytes_transferred:
      gt: 500000000 # Mayor a 500 MB (500,000,000 bytes)
  condition: selection # La condición es la selección de eventos que cumplen ambos criterios
fields:
  - Timestamp
  - source_ip # Dirección IP de origen del tráfico
  - dest_ip # Dirección IP de destino del tráfico
  - dest_port # Puerto de destino (debería ser 443)
  - bytes_transferred # Volumen de bytes transferidos
  - protocol # Protocolo (aunque implícitamente es TCP para 443, puede ser útil)
tags:
  - attack.tactic: TA0010 # Exfiltración (según lo proporcionado)
  - attack.technique: T1048.002 # Exfiltración sobre Protocolo Alternativo: Exfiltración sobre Protocolo Cifrado
platforms:
  - network # Plataformas de red (ej. firewalls, sistemas de monitoreo de red)
level: high # Nivel de severidad alto, ya que la exfiltración de datos es una actividad crítica.
references:
  - https://attack.mitre.org/techniques/T1048/002/
  - https://www.sans.org/blog/detecting-data-exfiltration-over-encrypted-channels/
  - https://www.cisecurity.org/controls/network-traffic-analysis/