title: Transferencia de Datos Sospechosa Detectada
id: "g0h1i2j3-k4l5-6m7n-8o9p-0q1r2s3t4u5v" # Nuevo ID generado
status: experimental
description: |
  Detección de transferencias de datos inusualmente grandes que podrían indicar una posible exfiltración de datos.
  Esta regla se enfoca en el volumen total de bytes transferidos, sin importar el protocolo específico.
author: aguztynbassi
date: 2025/05/24
modified: 2025/05/24
logsource:
  product: network # Fuente de logs de red (ej. firewalls, colectores de NetFlow)
  service: netflow # O 'flow', 'firewall', 'proxy' dependiendo del tipo de log de tráfico
  category: network_connection # O network_traffic para logs de conexión/tráfico
detection:
  selection:
    # Campo que representa el tamaño del tráfico en bytes.
    # Ajusta el nombre del campo 'bytes_transferred' según el esquema de tus logs.
    bytes_transferred:
      gt: 1000000000 # Mayor a 1 GB (1,000,000,000 bytes)
  condition: selection # La condición es la selección de eventos que cumplen el criterio de volumen
fields:
  - Timestamp
  - source_ip # Dirección IP de origen del tráfico
  - dest_ip # Dirección IP de destino del tráfico
  - source_port # Puerto de origen
  - dest_port # Puerto de destino
  - protocol # Protocolo de la conexión
  - bytes_transferred # Volumen de bytes transferidos
tags:
  - attack.tactic: TA0010 # Exfiltración
  - attack.technique: T1041 # Exfiltración sobre Recurso Compartido de Red (aunque la regla es más general, se mantiene la técnica solicitada)
platforms:
  - network # Plataformas de red (ej. firewalls, sistemas de monitoreo de red)
level: high # Nivel de severidad alto, ya que una transferencia de datos masiva es una actividad crítica.
references:
  - https://attack.mitre.org/techniques/T1041/
  - https://www.sans.org/blog/detecting-data-exfiltration-over-encrypted-channels/
  - https://www.cisecurity.org/controls/network-traffic-analysis/