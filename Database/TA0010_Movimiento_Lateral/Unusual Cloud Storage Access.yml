title: Acceso Inusual a Almacenamiento en la Nube
id: "h1i2j3k4-l5m6-7n8o-9p0q-1r2s3t4u5v6w" # Nuevo ID generado
status: experimental
description: |
  Detección de patrones de acceso inusuales a servicios de almacenamiento en la nube,
  lo que podría indicar una posible exfiltración de datos. Esta regla busca un número
  excesivo de descargas de archivos por parte de un usuario o de un archivo específico
  dentro de un período de tiempo.
author: aguztynbassi
date: 2025/05/24
modified: 2025/05/24
logsource:
  product: cloud # Producto general de la nube
  service: cloud_storage # Servicio específico de almacenamiento en la nube (ej. S3, GCS, Azure Blob)
  category: activity # Categoría de logs de actividad o acceso
detection:
  # Define la selección base de eventos: cualquier acción de descarga
  selection:
    action: download
  # Define la condición de umbral para detectar el comportamiento inusual
  # Busca más de 100 eventos de descarga (definidos en 'selection')
  # agrupados por 'user' y 'file_name' dentro de un período de 1 hora.
  threshold_condition:
    count: 100 # El número mínimo de descargas para activar la alerta
    timeframe: 1h # El período de tiempo en el que se cuentan las descargas
    by:
      - user # Agrupar por usuario
      - file_name # Agrupar por nombre de archivo
  condition: threshold_condition # La condición final es que se cumpla el umbral
fields:
  - Timestamp
  - user # El usuario que realiza la acción
  - file_name # El nombre del archivo accedido
  - action # La acción realizada (debería ser 'download')
  - source_ip # Dirección IP de origen del acceso
tags:
  - attack.tactic: TA0010 # Exfiltración
  - attack.technique: T1537 # Transferencia de Datos a la Nube
platforms:
  - cloud # Plataformas de nube (ej. AWS, GCP, Azure)
level: high # Nivel de severidad alto, ya que puede indicar exfiltración de datos.
references:
  - https://attack.mitre.org/techniques/T1537/
  - https://www.sans.org/blog/detecting-data-exfiltration-from-cloud-storage/
  - https://www.cisecurity.org/controls/cloud-security/