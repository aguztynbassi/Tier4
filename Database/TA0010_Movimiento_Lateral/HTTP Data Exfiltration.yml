title: Exfiltración de Datos por HTTP
id: "q8r9s0t1-u2v3-4w5x-6y7z-8a9b0c1d2e3f" # Nuevo ID generado
status: experimental
description: |
  Detección de grandes cantidades de datos siendo exfiltrados a través de HTTP.
  Esta regla busca transferencias HTTP salientes de gran tamaño (más de 10 MB)
  que podrían ser un indicador de datos siendo exfiltrados de la red de una
  manera inusual o no autorizada.
author: aguztynbassi
date: 2025/05/24
modified: 2025/05/24
logsource:
  category: web # Categoría de logs web
  service: http # Servicio específico de HTTP
  product: any # Puede ser cualquier producto que genere logs HTTP (ej. proxies, firewalls, servidores web)
detection:
  selection:
    # El campo que contiene la cantidad de bytes salientes.
    # Se asume que 'bytes_out' es el nombre del campo en los logs.
    bytes_out: # El campo debe ser numérico
      - '>10000000' # Más de 10 MB (10 * 1024 * 1024 = 10485760)
  condition: selection
fields:
  - Timestamp
  - source_ip # La dirección IP de origen que inicia la conexión HTTP
  - destination_ip # La dirección IP de destino de la conexión HTTP
  - destination_port # El puerto de destino (usualmente 80 o 443 para HTTP/S)
  - http_method # El método HTTP utilizado (ej. GET, POST)
  - request_url # La URL completa de la solicitud
  - user_agent # El User-Agent de la solicitud HTTP
  - bytes_out # La cantidad de bytes salientes
tags:
  - attack.tactic: TA0010 # Exfiltración
  - attack.technique: T1048.003 # Exfiltración sobre Protocolos Alternativos: HTTP/S
platforms:
  - network # Plataformas de red que generan logs HTTP
level: high # Nivel de severidad alto, ya que es una actividad de exfiltración.
references:
  - https://attack.mitre.org/techniques/T1048/003/
  - https://www.sans.org/blog/detecting-data-exfiltration-over-http/
  - https://www.cisecurity.org/controls/web-application-security/