title: Cargas de Archivos Sospechosas Detectadas
id: "f9g0h1i2-j3k4-5l6m-7n8o-9p0q1r2s3t4u" # Nuevo ID generado
status: experimental
description: |
  Detección de cargas de archivos grandes que pueden indicar exfiltración de datos.
author: aguztynbassi
date: 2025/05/24
modified: 2025/05/24
logsource:
  product: web_server # O el producto de tu servidor web/proxy
  service: http # Servicio que registra las cargas HTTP
  category: network # Categoría para eventos de red
detection:
  selection:
    action: 'upload' # O 'put', 'post', 'http_method: POST', etc., dependiendo de tus logs
    bytes_uploaded:
      gt: 10000000 # Más de 10MB (10,000,000 bytes)
  condition: selection
fields:
  - Timestamp
  - user # Usuario que realiza la carga
  - source_ip # Dirección IP de origen de la carga
  - destination_ip # Dirección IP de destino de la carga
  - bytes_uploaded # Cantidad de bytes cargados
  - file_name # Nombre del archivo cargado (si disponible)
  - url # URL a la que se cargó el archivo
tags:
  - attack.tactic: TA0010 # Exfiltración
  - attack.technique: T1048.003 # Exfiltración sobre Protocolo Alternativo: Exfiltración sobre Protocolo No C2 Sin Cifrar/Ofuscado
platforms:
  - network # Plataforma de red
  - web_server # Servidor web
  - firewall # Firewall
level: high # Nivel de severidad alto, ya que la exfiltración de datos es una actividad crítica.
references:
  - "https://www.splunk.com/en_us/blog/security/splunk-security-essentials-for-splunk-enterprise-security.html"
  - "https://www.splunk.com/en_us/blog/security/splunk-security-essentials-for-splunk-enterprise-security-part-2.html"
  - "https://www.splunk.com/en_us/blog/security/splunk-security-essentials-for-splunk-enterprise-security-part-3.html"
  - "https://www.splunk.com/en_us/blog/security/splunk-security-essentials-for-splunk-enterprise-security-part-4.html"