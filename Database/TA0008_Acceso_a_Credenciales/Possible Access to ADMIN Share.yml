title: Posible Acceso a Recurso Compartido ADMIN$
id: "d4e5f6a7-b8c9-4d0e-1f2a-3b4c5d6e7f8a" # Nuevo ID generado
status: medium
description: |
  Detecta el acceso al recurso compartido ADMIN$, lo que puede ayudar a identificar intentos de movimiento lateral. La actividad del recurso compartido de administración de Windows es común, proporcionando a los adversarios una forma discreta de moverse lateralmente. Las actividades administrativas legítimas pueden generar falsos positivos y requerirán una lista blanca.
author: aguztynbassi
date: 2024/07/18
modified: 2024/07/18
logsource:
  product: windows
  service: security # Event ID 5140 es un evento de auditoría de seguridad de Windows.
  category: file_share # Categoría para eventos de acceso a recursos compartidos.
detection:
  selection:
    EventID: 5140 # Un objeto de recurso compartido de red fue accedido.
    ShareName: 'Admin$'
  filter_user_accounts:
    User|endswith: '$' # Excluye cuentas de máquina (terminan en $)
  filter_excluded_users:
    User|startswith: # Excluye cuentas de sistema y de servicio. Ajustar según el entorno.
      - 'NT AUTHORITY\'
      - 'LOCAL SERVICE'
      - 'NETWORK SERVICE'
      # Añadir otros usuarios o grupos legítimos que puedan acceder a ADMIN$ de forma autorizada.
  condition: selection AND NOT filter_user_accounts AND NOT filter_excluded_users
fields:
  - EventID
  - Timestamp
  - User
  - ComputerName
  - ShareName
  - SourceAddress # Dirección IP de origen del acceso.
  - RelativeTargetName # El archivo o directorio específico accedido dentro del recurso compartido.
tags:
  - attack.tactic: TA0008 # Movimiento Lateral
  - attack.technique: T1021.002 # Servicios Remotos: Recursos Compartidos de Protocolo de Mensajes de Servidor (SMB)
level: medium # Nivel de severidad de la detección.
references:
  - https://learn.microsoft.com/en-us/windows/security/threat-protection/auditing/event-5140
  - https://www.elastic.co/guide/en/security/current/detection-engine-rules-dsl-reference.html
  - https://www.elastic.co/guide/en/security/current/detection-engine-rules-field-reference.html
  - https://attack.mitre.org/techniques/T1021/002/
  - https://www.elastic.co/blog/detecting-lateral-movement-with-elastic-security